async function saveProduct(e){
  e.preventDefault();
  const editId=document.getElementById('prod-edit-id').value;
  if(editId && !requirePermission('product_edit')) return;
  if(!editId && !requirePermission('product_create')) return;
  const brand=document.getElementById('p-brand').value.trim();
  const skuCode=document.getElementById('p-sku-code').value.trim();
  if(!brand) return showFlash(t('flash.brandRequired'),'warning');
  if(!skuCode) return showFlash(t('flash.skuRequired'),'warning');

  const products=await getProducts();
  // Check SKU uniqueness
  const dup=products.find(p=>p.sku_code===skuCode&&p.id!==editId);
  if(dup) return showFlash(t('flash.skuExists'),'warning');

  const now=new Date().toISOString();
  const data={
    id:editId||'prod_'+Date.now(),
    country:document.getElementById('p-country').value.trim(),
    brand,
    sku_code:skuCode,
    model:document.getElementById('p-model').value.trim(),
    category:document.getElementById('p-category').value.trim(),
    ean_code:document.getElementById('p-ean-code').value.trim(),
    status:document.getElementById('p-status').value,
    updated_at:now
  };

  if(editId){
    const idx=products.findIndex(p=>p.id===editId);
    if(idx>=0){ data.created_at=products[idx].created_at; products[idx]=data; }
  }else{
    data.created_at=now; products.push(data);
  }
  await saveProducts(products);
  closeProductModal();
  showFlash(editId?t('flash.product.updateSuccess'):t('flash.product.createSuccess'),'success');
  renderProducts();
}

async function deleteProduct(id){
  if(!requirePermission('product_delete')) return;
  // Check if referenced in records
  const productsList=await getProducts();
  const product=productsList.find(p=>p.id===id);
  if(!product) return;
  const records=await getRecords();
  const refCount=records.filter(r=>(r.items||[]).some(it=>it.sku_code===product.sku_code)).length;
  if(refCount>0) return showFlash(`${t('flash.product.deleteReferenced', {count: refCount})}`,'danger');
  if(!confirm(t('confirm.message.deleteProduct'))) return;
  try{
    await deleteProductAsync(id);
    showFlash(t('flash.productDeleted'),'info');
    renderProducts();
  }catch(e){
    showFlash(t('flash.deleteFailed') + e.message,'danger');
  }
}

async function loadCustomers() {
  const area = document.getElementById('customers-table-area');
  const pagDiv = document.getElementById('customers-pagination');
  area.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted)">${t('customers.loading')}</div>`;
  pagDiv.innerHTML = '';

  const search = document.getElementById('customer-search-input')?.value || '';
  const status = document.getElementById('customer-status-filter')?.value || '';
  const params = new URLSearchParams({ limit: _customerLimit, offset: _customerPage * _customerLimit });
  if (search) params.set('search', search);
  if (status) params.set('status', status);

  try {
    const resp = await fetch(`/api/customers?${params.toString()}`, { headers: getAuthHeaders() });
    const result = await resp.json();

    if (!result.success) {
      area.innerHTML = `<div class="empty-state"><div class="empty-icon">&#x26A0;</div><p>${esc(result.error || t('customers.loadError'))}</p></div>`;
      return;
    }

    const { customers, total, limit, offset } = result;

    if (customers.length === 0) {
      area.innerHTML = `<div class="empty-state"><div class="empty-icon">&#x1F3E2;</div><p>${t('customers.empty')}</p></div>`;
      return;
    }

    let html = `<div class="table-container"><table class="data-table"><thead><tr>
      <th>${t('customers.col.country')}</th>
      <th>${t('customers.col.name')}</th>
      <th>${t('customers.col.contact')}</th>
      <th>${t('customers.col.phone')}</th>
      <th>${t('customers.col.email')}</th>
      <th>${t('customers.col.status')}</th>
      <th>${t('customers.col.source')}</th>
      <th>${t('customers.col.lastSync')}</th>
    </tr></thead><tbody>`;

    customers.forEach(c => {
      const statusClass = c.status === 'active' ? 'user-status-active' : 'user-status-disabled';
      html += `<tr>
        <td><span class="country-tag">${esc(c.country || '-')}</span></td>
        <td class="cell-name">${esc(c.customer_name || '-')}</td>
        <td>${esc(c.contact_person || '-')}</td>
        <td>${esc(c.phone || '-')}</td>
        <td style="font-size:12px">${esc(c.email || '-')}</td>
        <td><span class="user-status ${statusClass}">${c.status === 'active' ? t('customers.statusActive') : t('customers.statusInactive')}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${esc(c.source || '-')}</td>
        <td class="cell-date">${formatDate(c.last_synced_at)}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
    area.innerHTML = html;

    // Pagination
    const totalPages = Math.ceil(total / limit);
    if (totalPages > 1) {
      let pagHtml = `<span>${t('customers.totalCount', { count: total })}</span>`;
      if (_customerPage > 0) pagHtml += `<button class="btn btn-sm" onclick="prevCustomers()">${t('customers.prevPage')}</button>`;
      pagHtml += `<span>${_customerPage + 1} / ${totalPages}</span>`;
      if (_customerPage < totalPages - 1) pagHtml += `<button class="btn btn-sm" onclick="nextCustomers()">${t('customers.nextPage')}</button>`;
      pagDiv.innerHTML = pagHtml;
    } else {
      pagDiv.innerHTML = `<span>${t('customers.totalCount', { count: total })}</span>`;
    }
  } catch (err) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">&#x26A0;</div><p>${esc(err.message)}</p></div>`;
  }
}

function prevCustomers() { _customerPage--; loadCustomers(); }
function nextCustomers() { _customerPage++; loadCustomers(); }

// ==================== 飞书通讯录搜索 ====================
let feishuSearchTimer = null;
let feishuSearchResults = [];
let selectedFeishuContact = null;

function searchFeishuContacts(query) {
  const dropdownEl = document.getElementById('feishu-search-dropdown');
  const usernameEl = document.getElementById('u-username');
  
  // 编辑模式不触发搜索
  if (usernameEl && usernameEl.disabled) return;
  
  clearTimeout(feishuSearchTimer);
  
  if (!query || query.trim().length === 0) {
    feishuSearchResults = [];
    if (dropdownEl) dropdownEl.style.display = 'none';
    return;
  }
  
  feishuSearchTimer = setTimeout(async () => {
    const q = query.trim();
    if (q.length < 1) return;
    
    // 显示加载状态
    if (dropdownEl) {
      dropdownEl.style.display = 'block';
      dropdownEl.innerHTML = '<div class="fs-loading">搜索中...</div>';
    }
    
    try {
      const resp = await fetch(`/api/feishu/contacts/search?query=${encodeURIComponent(q)}`);
      const data = await resp.json();
      
      if (data.success && data.users) {
        feishuSearchResults = data.users;
        renderFeishuSearchResults(data.users);
      } else {
        // 显示错误提示
        const errParts = [];
        if (!data.success) {
          errParts.push(data.error || '搜索失败');
        } else {
          errParts.push('未找到匹配的飞书用户');
        }
        if (data.error && data.error.includes('权限')) {
          errParts.push('<br><small style="color:#e67e22">请在飞书开发者后台启用"通讯录"相关权限</small>');
        }
        if (dropdownEl) {
          dropdownEl.innerHTML = `<div class="fs-empty">${errParts.join('')}</div>`;
        }
      }
    } catch (e) {
      if (dropdownEl) {
        dropdownEl.innerHTML = '<div class="fs-empty">搜索失败，请检查飞书集成状态</div>';
      }
    }
  }, 300);
}

function renderFeishuSearchResults(users) {
  const dropdownEl = document.getElementById('feishu-search-dropdown');
  if (!dropdownEl) return;
  
  if (!users || users.length === 0) {
    dropdownEl.innerHTML = '<div class="fs-empty">未找到匹配的飞书用户</div>';
    return;
  }
  
  let html = '';
  users.forEach((u, idx) => {
    const name = u.name || u.full_name || '未知';
    const fullName = u.full_name || '';
    const dept = (u.department_names || []).join(' / ') || '';
    const email = u.email || '';
    // 显示更多信息：英文名 + 中文名 + 邮箱
    let displayName = name;
    if (u.en_name && u.en_name !== name) {
      displayName = `${u.en_name} (${name})`;
    }
    if (email) {
      displayName += ` · ${email}`;
    }
    const avatarHtml = u.avatar 
      ? `<img src="${escAttr(u.avatar)}" alt="">` 
      : name.charAt(0);
    
    html += `<div class="fs-item" onclick="selectFeishuUser(${idx})">
      <div class="fs-avatar">${avatarHtml}</div>
      <div class="fs-info">
        <div class="fs-name">${esc(displayName)}</div>
        ${dept ? `<div class="fs-dept">${esc(dept)}</div>` : ''}
      </div>
    </div>`;
  });
  
  dropdownEl.innerHTML = html;
  dropdownEl.style.display = 'block';
}

function selectFeishuUser(idx) {
  const u = feishuSearchResults[idx];
  if (!u) return;
  
  selectedFeishuContact = u;
  
  // 设置隐藏的 open_id
  document.getElementById('u-feishu-openid').value = u.open_id;
  
  // 设置显示名称（优先 en_name，其次 name）
  const displayName = u.en_name || u.name || u.full_name || '飞书用户';
  document.getElementById('u-username').value = displayName;
  
  // 设置姓名（中文名或英文名）
  const realName = u.full_name || u.name || displayName;
  document.getElementById('u-name').value = realName;
  
  // 隐藏下拉
  document.getElementById('feishu-search-dropdown').style.display = 'none';
  
  // 显示已选用户卡片
  const selectedEl = document.getElementById('u-feishu-selected');
  const selectedName = document.getElementById('u-feishu-selected-name');

async function saveUser(e){
  e.preventDefault();
  if(!requirePermission('user_manage')) return;
  const editId=document.getElementById('user-edit-id').value;
  const usernameEl=document.getElementById('u-username');
  const username=usernameEl.value.trim();
  const name=document.getElementById('u-name').value.trim();
  const password=document.getElementById('u-password').value;
  const roleId=document.getElementById('u-role').value;
  const status=document.getElementById('u-status').value;
  const feishuOpenId = (document.getElementById('u-feishu-openid')?.value || '').trim();
  
  if(!editId && !feishuOpenId) return showFlash(t('flash.searchFeishuUser'),'warning');
  if(!username||!name) return showFlash(t('flash.usernameAndNameRequired'),'warning');
  if(!editId&&!password) return showFlash(t('flash.user.passwordRequired'),'warning');
  
  const users=await getUsers();
  // 新建时检查飞书 Open ID 是否已被绑定（不允许重复绑定）
  if(!editId && feishuOpenId && users.some(u=>u.feishu_open_id===feishuOpenId)) {
    return showFlash(t('flash.user.feishuAlreadyBound'),'danger');
  }
  if(!editId&&users.some(u=>u.username===username)) return showFlash(t('flash.user.usernameExists'),'danger');
  
  // 从 selectedFeishuContact 获取完整飞书信息
  const feishuInfo = selectedFeishuContact || {};
  
  if(editId){
    const idx=users.findIndex(u=>u.id===editId);
    if(idx>=0){ 
      users[idx].name=name; 
      if(password) users[idx].password=password; 
      users[idx].role_id=roleId; 
      users[idx].status=status; 
      users[idx].feishu_open_id=feishuOpenId;
      users[idx].feishu_user_id = users[idx].feishu_user_id || feishuInfo.user_id || '';
      users[idx].feishu_name = users[idx].feishu_name || username;
      users[idx].feishu_email = users[idx].feishu_email || (feishuInfo.email || '');
    }
  }else{
    users.push({
      id:'user_'+Date.now(), 
      username, 
      name, 
      password, 
      role_id:roleId, 
      status, 
      feishu_open_id: feishuOpenId,
      feishu_user_id: feishuInfo.user_id || '',
      feishu_name: feishuInfo.en_name || feishuInfo.name || username,
      feishu_union_id: feishuInfo.union_id || '',
      feishu_email: feishuInfo.email || '',
      feishu_avatar: feishuInfo.avatar || '',
      feishu_tenant_key: '',
      created_at: new Date().toISOString()
    });
  }
  await saveUsers(users);
  selectedFeishuContact = null;
  closeUserModal();
  showFlash(editId?t('flash.user.updateSuccess'):t('flash.user.createSuccess'),'success');
  renderUsers();
}

function importSalesData(event){
  if(!requirePermission('sales_import')) return;
  const file=event.target.files[0];
  if(!file) return;
  if(typeof XLSX==='undefined'){ showFlash(t('flash.excel.libraryLoadFailed'),'danger'); return; }
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws);
      if(rows.length===0){ showFlash(t('flash.excel.fileEmpty'),'warning'); return; }
      const headers=Object.keys(rows[0]);
      const colMap=resolveColumns(headers);
      if(!colMap){ showFlash(t('flash.excel.columnMismatch'),'danger'); return; }
      const salesData=await getSalesData();
      let success=0,errors=0;
      rows.forEach((row,i)=>{
        const brand=String(row[colMap.brand]||'').trim();
        if(!brand){ errors++; return; }
        let month=String(row[colMap.month]||'').trim();
        month=month.replace('/','-');
        if(!/^\d{4}-\d{2}$/.test(month)){ errors++; return; }
        const fields=['online_shipment','online_sales','offline_shipment','offline_sales'];
        for(const f of fields){ if(isNaN(Number(row[colMap[f]]))){ errors++; return; } }
        const entry={
          brand, month,
          online_shipment:Number(row[colMap.online_shipment]),
          online_sales:Number(row[colMap.online_sales]),
          offline_shipment:Number(row[colMap.offline_shipment]),
          offline_sales:Number(row[colMap.offline_sales])
        };
        const idx=salesData.findIndex(d=>d.brand===brand&&d.month===month);
        if(idx>=0) salesData[idx]=entry; else salesData.push(entry);
        success++;
      });
      await saveSalesData(salesData);
      showFlash(`${t('flash.import.summary', {success: success})}`+(errors>0?t('flash.import.skipped', {errors: errors}):''),errors>0?'warning':'success');
      renderOverview();
    }catch(err){ showFlash(t('flash.excel.parseError')+err.message,'danger'); }
  };
  reader.readAsArrayBuffer(file);
  event.target.value='';
}

function resolveColumns(headers){
  const patterns={
    brand:['品牌','brand','品名'],
    month:['月份','month','月份/月','日期'],
    online_shipment:['线上出货量','线上出货','出货量(线上)','出货量（线上）'],
    online_sales:['线上销量','线上销','销量(线上)','销量（线上）'],
    offline_shipment:['线下出货量','线下出货','出货量(线下)','出货量（线下）'],
    offline_sales:['线下销量','线下销','销量(线下)','销量（线下）']
  };
  const result={};
  for(const[key,pats] of Object.entries(patterns)){
    let found=null;
    for(const h of headers){ for(const p of pats){ if(h.includes(p)){ found=h; break; } } if(found) break; }
    if(!found) return null;
    result[key]=found;
  }
  return result;
}

function applyStaticI18n() {
  // 翻译 data-i18n 元素
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!key) return;
    let value = t(key);
    const suffix = el.getAttribute('data-i18n-suffix');
    if (suffix) value += suffix;
    if (el.tagName === 'TITLE') document.title = value;
    else el.textContent = value;
  });
  // 翻译 data-i18n-placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (key) el.placeholder = t(key);
  });
  // 翻译 data-i18n-params（批量计数等动态文本）
  document.querySelectorAll('[data-i18n-params]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!key) return;
    try {
      const params = JSON.parse(el.getAttribute('data-i18n-params') || '{}');
      el.textContent = t(key, params);
    } catch (e) { el.textContent = t(key); }
  });
}

function applyDateInputLocale() {
  const locale = window.__i18n && window.__i18n.getLocale ? window.__i18n.getLocale() : 'zh-CN';
  const langMap = {'zh-CN': 'zh-CN', 'en-US': 'en-US', 'id-ID': 'id-ID'};

    'zh-CN': 'YYYY-MM-DD',

// 在控制台执行: __i18n_test() 测试所有 key 解析
window.__i18n_test = async function() {
  await window.__i18n.init();
  const zh = window.__i18n.bundle('zh-CN') || {};
  let total = 0, errors = 0;
  const errorList = [];

  function test(obj, prefix) {
    for (const key of Object.keys(obj)) {
      const fullKey = prefix ? `${prefix}.${key}` : key;
      if (typeof obj[key] === 'string') {
        total++;
        for (const loc of window.__i18n.SUPPORTED_LOCALES) {
          const val = window.__i18n.t(fullKey);
          if (val === fullKey || val === undefined || val === '') {
            errors++;
            errorList.push({ key: fullKey, locale: loc, value: val });
          }
        }
      } else if (typeof obj[key] === 'object' && obj[key] !== null) {
        test(obj[key], fullKey);
      }
    }
  }
  test(zh, '');
  console.log(`%c📊 i18n Key 解析测试`, 'font-size:16px;font-weight:bold');
  console.log(`总 key: ${total}, 错误: ${errors}`);
  if (errors === 0) {
    console.log('%c✅ 所有 key 解析正常！', 'color:#2e7d32');
  } else {
    console.log(`%c❌ ${errors} 个 key 解析异常`, 'color:#ff3b30');
    errorList.slice(0, 20).forEach(e => console.log(`  ${e.locale}: ${e.key} → "${e.value}"`));
  }
  return { total, errors, errorList };
};

  try {
    const [flowResp, userResp, roleResp] = await Promise.all([
      fetch('/api/approval-flows', { headers: getAuthHeaders() }),
      fetch('/api/users', { headers: getAuthHeaders() }),
      fetch('/api/roles', { headers: getAuthHeaders() })
    ]);
    _afFlows = await flowResp.json();
    _afUsers = await userResp.json();
    _afRoles = await roleResp.json();
    if (!Array.isArray(_afFlows)) _afFlows = [];
    // 补全: 老数据可能没有 approver_name / backup_approver_name,从 users 反查填上
    _afFlows.forEach(f => {
      (f.nodes || []).forEach(n => {
        if (n.approver_id && !n.approver_name) {
          const u = _afUsers.find(u => u.id === n.approver_id);
          if (u) n.approver_name = u.name;
        }
        if (n.backup_approver_id && !n.backup_approver_name) {
          const u = _afUsers.find(u => u.id === n.backup_approver_id);
          if (u) n.backup_approver_name = u.name;
        }
      });
    });
    _afCurrentIdx = 0;
    _afSelectedNode = -1;
    _afRenderPage();
  } catch (e) {
    area.innerHTML = '<div style="text-align:center;padding:40px;color:#e53935">加载失败: ' + esc(e.message) + '</div>';
  }
}

function _afUsersWithPerm(perm) {
  return (_afUsers || []).filter(u => u.status === 'active').filter(u => {
    const role = (_afRoles || []).find(r => r.id === u.role_id);
    if (!role) return false;
    let perms = role.permissions;
    if (typeof perms === 'string') { try { perms = JSON.parse(perms); } catch(_) { perms = []; } }
    return Array.isArray(perms) && perms.includes(perm);
  });
}

function _afPermLabel(perm) {
  const map = { approval_level1: '一级审批权限', approval_level2: '二级审批权限', approval_level3: '三级审批权限' };
  return map[perm] || perm;
}

  h += '<div class="af-stat-card"><div class="af-stat-num" style="color:var(--primary)">' + enabled + '</div><div class="af-stat-label">启用中</div></div>';
  h += '<div class="af-stat-card"><div class="af-stat-num" style="color:var(--text-muted)">' + disabled + '</div><div class="af-stat-label">已停用</div></div>';

  h += '<span style="font-size:12px;color:var(--text-muted)">新建时自动复制标准售后审批流配置</span>';
  h += '</div>';
  h += '<table class="af-table"><thead><tr><th>流程名称</th><th>适用范围</th><th>审批层级</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  _afFlows.forEach((f, i) => {
    h += '<tr class="' + (i === _afCurrentIdx ? 'selected' : '') + '" onclick="selectFlow(' + i + ')">';
    h += '<td style="font-weight:600">' + esc(f.name) + '</td>';
    h += '<td>' + esc(f.scope || '-') + '</td>';
    h += '<td>' + (f.nodes ? f.nodes.length : 0) + ' 级</td>';
    h += '<td><span class="af-badge ' + (f.enabled ? 'af-badge-on' : 'af-badge-off') + '">' + (f.enabled ? '启用' : '停用') + '</span></td>';
    h += '<td onclick="event.stopPropagation()">';
    if (f.id !== 'flow_standard') {
      h += '<button class="af-btn af-btn-danger af-btn-sm" onclick="deleteApprovalFlow(\'' + esc(f.id) + '\',\'' + esc(f.name).replace(/'/g, "\\'") + '\')">删除</button>';
    } else {
      h += '<span style="font-size:11px;color:var(--text-muted)">默认流程</span>';
    }
    h += '</td></tr>';
  });
  h += '</tbody></table></div>';

  // 流程编辑器
  if (_afFlows.length > 0 && _afFlows[_afCurrentIdx]) {
    const flow = _afFlows[_afCurrentIdx];
    h += '<div class="af-card">';
    // 编辑器头部
    h += '<div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">';
    h += '<div style="display:flex;align-items:center;gap:12px">';
    h += '<input class="af-config-input" style="width:220px;font-weight:600;font-size:15px" value="' + esc(flow.name) + '" id="af-flow-name" onchange="updateFlowField(\'name\',this.value)">';
    h += '<span class="af-badge ' + (flow.enabled ? 'af-badge-on' : 'af-badge-off') + '">' + (flow.enabled ? '启用' : '停用') + '</span>';
    h += '</div>';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<span style="font-size:12px;color:var(--text-muted)">启用/停用</span>';
    h += '<div class="af-toggle ' + (flow.enabled ? 'af-toggle-on' : 'af-toggle-off') + '" onclick="toggleFlowEnabled()"><div class="af-toggle-knob"></div></div>';
    h += '<button class="af-btn af-btn-primary af-btn-sm" onclick="saveFlow()">保存</button>';
    h += '</div></div>';

    // 适用范围
    h += '<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">';
    h += '<span style="font-size:13px;color:var(--text-secondary);width:80px;text-align:right">适用范围</span>';
    h += '<input class="af-config-input" value="' + esc(flow.scope || '') + '" id="af-flow-scope" onchange="updateFlowField(\'scope\',this.value)" style="max-width:400px">';
    h += '</div>';

    // 可视化流程节点
    h += '<div class="af-flow-container" id="af-flow-container">';
    h += '<div class="af-flow-node af-flow-node-start"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">起始</div><div style="font-size:14px;font-weight:600">提交申请</div></div>';
    (flow.nodes || []).forEach((node, i) => {
      h += '<div class="af-flow-arrow">&#x2192;</div>';
      h += '<div class="af-flow-node ' + (i === _afSelectedNode ? 'active' : '') + '" onclick="selectFlowNode(' + i + ')">';
      h += '<div class="af-flow-level-tag">L' + (i + 1) + '</div>';
      h += '<div style="font-size:14px;font-weight:600">' + esc(node.title || ('审批层级' + (i + 1))) + '</div>';
      h += '<div style="font-size:11px;color:var(--text-secondary);margin-top:4px">' + esc(_afPermLabel(node.permission)) + '</div>';
      h += '</div>';
    });
    h += '<div class="af-flow-arrow">&#x2192;</div>';
    h += '<div class="af-flow-node af-flow-node-end"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">结束</div><div style="font-size:14px;font-weight:600">审批完成</div></div>';

    h += '</div>';

    // 节点配置面板
    if (_afSelectedNode >= 0 && _afSelectedNode < (flow.nodes || []).length) {
      h += _afRenderNodeConfig(flow.nodes[_afSelectedNode], _afSelectedNode, flow.nodes.length);
    } else {
      h += '<div class="af-empty" style="padding:24px">点击上方审批节点查看和编辑配置</div>';

  area.innerHTML = h;

function _afRenderNodeConfig(node, idx, total) {
  const users = _afUsersWithPerm(node.permission);
  let h = '<div class="af-config-panel">';
  h += '<div style="font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
  h += '<span>节点配置 - L' + (idx + 1) + '</span>';
  h += '<div class="af-node-actions">';
  if (idx > 0) h += '<button class="af-btn af-btn-secondary af-btn-sm" onclick="moveFlowNode(' + idx + ',-1)">&#x2191; 上移</button>';
  if (idx < total - 1) h += '<button class="af-btn af-btn-secondary af-btn-sm" onclick="moveFlowNode(' + idx + ',1)">&#x2193; 下移</button>';
  h += '<button class="af-btn af-btn-danger af-btn-sm" onclick="deleteFlowNode(' + idx + ')">&#x2715; 删除层级</button>';
  h += '</div></div>';

  // 层级名称
  h += '<div class="af-config-row"><span class="af-config-label">层级名称</span>';
  h += '<input class="af-config-input" value="' + esc(node.title || '') + '" onchange="updateNodeField(' + idx + ',\'title\',this.value)"></div>';

  // 审批权限
  h += '<div class="af-config-row"><span class="af-config-label">审批权限</span>';
  h += '<select class="af-config-select" onchange="updateNodeField(' + idx + ',\'permission\',this.value)">';
  ['approval_level1', 'approval_level2', 'approval_level3'].forEach(p => {
    h += '<option value="' + p + '"' + (node.permission === p ? ' selected' : '') + '>' + esc(_afPermLabel(p)) + '</option>';
  });
  h += '</select></div>';
  h += '<div class="af-config-hint">审批人列表自动筛选具有对应权限的在职用户</div>';

  // 审批人
  h += '<div class="af-config-row"><span class="af-config-label">审批人</span>';
  h += '<select class="af-config-select" onchange="updateNodeField(' + idx + ',\'approver_id\',this.value)">';
  h += '<option value="">请选择</option>';
  users.forEach(u => {
    h += '<option value="' + esc(u.id) + '"' + (node.approver_id === u.id ? ' selected' : '') + '>' + esc(u.name) + ' (' + esc(u.username) + ')</option>';
  });
  h += '</select></div>';
  h += '<div class="af-config-hint">当前有 ' + users.length + ' 名用户具有此权限</div>';

  // 备选审批人
  h += '<div class="af-config-row"><span class="af-config-label">备选审批人</span>';
  h += '<select class="af-config-select" onchange="updateNodeField(' + idx + ',\'backup_approver_id\',this.value)">';
  h += '<option value="">无</option>';
  users.forEach(u => {
    h += '<option value="' + esc(u.id) + '"' + (node.backup_approver_id === u.id ? ' selected' : '') + '>' + esc(u.name) + ' (' + esc(u.username) + ')</option>';
  });
  h += '</select></div>';

  h += '</div>';
  return h;
}

function selectFlow(idx) {
  _afCurrentIdx = idx;
  _afSelectedNode = -1;
  _afRenderPage();
}

function selectFlowNode(idx) {
  _afSelectedNode = idx;
  _afRenderPage();
}

function updateFlowField(field, value) {
  if (!_afFlows[_afCurrentIdx]) return;
  _afFlows[_afCurrentIdx][field] = value;
}

function updateNodeField(nodeIdx, field, value) {
  const flow = _afFlows[_afCurrentIdx];
  if (!flow || !flow.nodes || !flow.nodes[nodeIdx]) return;
  flow.nodes[nodeIdx][field] = value;
  if (field === 'permission') {
    flow.nodes[nodeIdx].approver_id = '';
    flow.nodes[nodeIdx].approver_name = '';
    flow.nodes[nodeIdx].backup_approver_id = '';
    flow.nodes[nodeIdx].backup_approver_name = '';
    _afRenderPage();
  } else if (field === 'approver_id') {
    // 同步写入 approver_name,从 _afUsers 中查
    const u = (_afUsers || []).find(x => x.id === value);
    flow.nodes[nodeIdx].approver_name = u ? u.name : '';
  } else if (field === 'backup_approver_id') {
    const u = (_afUsers || []).find(x => x.id === value);
    flow.nodes[nodeIdx].backup_approver_name = u ? u.name : '';
  }
}

function addFlowNode() {
  const flow = _afFlows[_afCurrentIdx];
  if (!flow) return;
  if (!flow.nodes) flow.nodes = [];
  const lvl = flow.nodes.length + 1;
  const perm = lvl <= 3 ? 'approval_level' + lvl : 'approval_level3';
  flow.nodes.push({ level: lvl, title: '审批层级' + lvl, permission: perm });
  _afSelectedNode = flow.nodes.length - 1;
  _afRenderPage();
}

function moveFlowNode(idx, dir) {
  const flow = _afFlows[_afCurrentIdx];
  if (!flow || !flow.nodes) return;
  const ni = idx + dir;
  if (ni < 0 || ni >= flow.nodes.length) return;
  const tmp = flow.nodes[idx];
  flow.nodes[idx] = flow.nodes[ni];
  flow.nodes[ni] = tmp;
  _afSelectedNode = ni;
  _afRenderPage();
}

function deleteFlowNode(idx) {
  const flow = _afFlows[_afCurrentIdx];
  if (!flow || !flow.nodes) return;
  if (flow.nodes.length <= 1) { alert('至少保留一个审批层级'); return; }
  flow.nodes.splice(idx, 1);
  _afSelectedNode = -1;
  _afRenderPage();
}

function toggleFlowEnabled() {
  const flow = _afFlows[_afCurrentIdx];
  if (!flow) return;
  flow.enabled = !flow.enabled;
  _afRenderPage();
}

async function saveFlow() {
  const flow = _afFlows[_afCurrentIdx];
  if (!flow) return;
  try {
    const resp = await fetch('/api/approval-flows/' + encodeURIComponent(flow.id), {
      method: 'PUT',
      headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: flow.name, scope: flow.scope, enabled: flow.enabled, nodes: flow.nodes })
    });
    if (resp.ok) {
      alert('保存成功');
    } else {
      const err = await resp.json();
      alert('保存失败: ' + (err.error || '未知错误'));
    }
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

async function createApprovalFlow() {
  const standard = _afFlows.find(f => f.id === 'flow_standard') || _afFlows[0];
  if (!standard) { alert('未找到标准审批流，无法复制'); return; }
  const newFlow = {
    id: 'flow_' + Date.now(),
    name: '新审批流（复制自标准流）',
    scope: standard.scope || '全部售后记录',
    enabled: false,
    nodes: JSON.parse(JSON.stringify(standard.nodes || []))
  };
  try {
    const resp = await fetch('/api/approval-flows', {
      method: 'POST',
      headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(newFlow)
    });
    if (resp.ok) {
      await renderApprovalFlows();
      _afCurrentIdx = _afFlows.length - 1;
      _afRenderPage();
      alert('已创建新审批流（复制自标准流配置），请编辑名称和配置后启用');
    } else {
      const err = await resp.json();
      alert('创建失败: ' + (err.error || '未知错误'));
    }
  } catch (e) {
    alert('创建失败: ' + e.message);
  }
}

async function deleteApprovalFlow(id, name) {
  if (!confirm('确定删除审批流「' + name + '」？')) return;
  try {
    const resp = await fetch('/api/approval-flows/' + encodeURIComponent(id), {
      method: 'DELETE',
      headers: getAuthHeaders()
    });
    if (resp.ok) {
      await renderApprovalFlows();
    } else {
      const err = await resp.json();
      alert('删除失败: ' + (err.error || '未知错误'));
    }
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

// ==================== 字典管理 ====================
const DICT_CATEGORY_IDS = ['return_reason', 'platform', 'return_method', 'shop_customer', 'common'];
function _dictGetCategoryLabel(id) {
  // 从 i18n 取类别名,跟随顶部语言切换
  try {
    const t = (window.t ? window.t : (k) => k);
    const v = t('dictionaries.category.' + id);
    if (v && v !== 'dictionaries.category.' + id) return v;
  } catch (e) {}
  // 后备: 用 _dictFallbackLabels
  return _dictFallbackLabels[id] || id;
}
const _dictFallbackLabels = { return_reason: '退货原因', platform: '平台', return_method: '退货方式', shop_customer: '店铺/客户', common: '通用类别' };
function _dictLangShort() {
  const loc = (window.__i18n && window.__i18n.getLocale) ? window.__i18n.getLocale() : 'zh-CN';
  if (loc === 'en-US') return 'en';
  if (loc === 'id-ID') return 'id';
  return 'zh';
}
function _dictCurrentName(item) {
  if (!item) return '';
  const lang = _dictLangShort();
  if (lang === 'en') return item.label_en || item.label_zh || item.label_id || item.code;
  if (lang === 'id') return item.label_id || item.label_zh || item.label_en || item.code;
  return item.label_zh || item.label_en || item.label_id || item.code;
}
let _dictAll = [];
let _dictCurrent = 'return_reason';
let _dictCache = {};

async function renderDictionaries() {
  if (!document.getElementById('dict-category-list')) return;
  try {
    const resp = await fetch('/api/dictionaries', { headers: getAuthHeaders() });
    _dictAll = await resp.json() || [];
    _dictCache = {};
    _dictAll.forEach(d => { (_dictCache[d.category] = _dictCache[d.category] || []).push(d); });
    _dictRenderSidebar();
    _dictRenderItems();
  } catch (e) {
    document.getElementById('dict-items-area').innerHTML = '<div style="text-align:center;padding:40px;color:#e53935">' + esc(t('dictionaries.loadFailed') + e.message) + '</div>';
  }
}

function _dictRenderSidebar() {
  const el = document.getElementById('dict-category-list');
  let h = '';
  DICT_CATEGORY_IDS.forEach(id => {
    const cnt = (_dictCache[id] || []).length;
    h += '<div class="dict-cat-item ' + (id === _dictCurrent ? 'active' : '') + '" onclick="selectDictCategory(\'' + id + '\')">';
    h += '<span>' + esc(_dictGetCategoryLabel(id)) + '</span><span class="dict-cat-count">' + cnt + '</span></div>';
  });
  el.innerHTML = h;
}

function _dictRenderItems() {
  const area = document.getElementById('dict-items-area');

  const catLabel = _dictGetCategoryLabel(_dictCurrent);
  const cntSuffix = t('dictionaries.itemsCount', { count: list.length });

  h += '<button class="af-btn af-btn-primary af-btn-sm" onclick="showDictAddForm()">' + esc(t('dictionaries.btnAdd')) + '</button>';
  h += '</div>';

  if (list.length === 0) {
    h += '<div style="padding:40px;text-align:center;color:var(--text-muted)">' + esc(t('dictionaries.empty')) + '</div>';

  }

  }
  h += '<th style="width:120px">' + esc(t('dictionaries.col.status')) + '</th>';
  h += '<th style="width:160px">' + esc(t('dictionaries.col.actions')) + '</th>';
  h += '</tr></thead><tbody>';
  list.forEach(d => {
    const displayName = _dictCurrentName(d) || d.code;

      // 所属平台下拉
      let opts = '<option value="">' + esc(t('form.option.pleaseSelect')) + '</option>';
      platformList.forEach(p => {
        opts += '<option value="' + esc(p.code) + '"' + (d.parent_code === p.code ? ' selected' : '') + '>' + esc(_dictCurrentName(p)) + '</option>';

    h += '<td><div class="dict-actions-cell"><button class="af-btn af-btn-secondary af-btn-sm" onclick="updateDictName(\'' + d.id + '\',null,true)">' + esc(t('dictionaries.btnSave')) + '</button><button class="af-btn af-btn-danger af-btn-sm" onclick="deleteDictItem(\'' + d.id + '\')">' + esc(t('dictionaries.btnDelete')) + '</button></div></td>';

function selectDictCategory(id) {
  _dictCurrent = id;
  _dictRenderSidebar();
  _dictRenderItems();
}

// 编辑/保存: 名称只输入一个值,按当前语言写到对应的 label_*;同时同步给另两种语言(保证下拉项在所有语言下都能显示)。
async function updateDictName(id, value, saveNow) {
  const item = _dictAll.find(d => d.id === id);
  if (!item) return;
  if (value !== null && value !== undefined) {
    const lang = _dictLangShort();
    item.label_zh = value;
    item.label_en = value;
    item.label_id = value;
    // (实际只按当前语言写是允许的,但为保持下拉多语言可见,这里同步写入三列)
  }
  if (saveNow) {
    try {
      const resp = await fetch('/api/dictionaries/' + encodeURIComponent(id), {
        method: 'PUT',
        headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({
          label_zh: item.label_zh,
          label_en: item.label_en,
          label_id: item.label_id,
          sort_order: item.sort_order || 0,
          enabled: item.enabled,
          parent_code: item.parent_code || ''
        })
      });
      if (resp.ok) {
        Object.assign(item, await resp.json());
        toast(t('dictionaries.saveSuccess'), 'success');
      } else {
        const err = await resp.json();
        toast(t('dictionaries.saveFailed') + (err.error || ''), 'error');
      }
    } catch (e) { toast(t('dictionaries.saveFailed') + e.message, 'error'); }
  }
}

async function toggleDictEnabled(id) {
  const item = _dictAll.find(d => d.id === id);
  if (!item) return;
  item.enabled = !item.enabled;
  try {
    await fetch('/api/dictionaries/' + encodeURIComponent(id), {
      method: 'PUT',
      headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: item.enabled })
    });
    _dictRenderItems();
  } catch (e) { toast(t('dictionaries.deleteFailed') + e.message, 'error'); }
}

async function updateDictParent(id, parentCode) {
  const item = _dictAll.find(d => d.id === id);
  if (!item) return;
  item.parent_code = parentCode || '';
  try {
    await fetch('/api/dictionaries/' + encodeURIComponent(id), {
      method: 'PUT',
      headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ parent_code: item.parent_code })
    });
    toast(t('dictionaries.saveSuccess'), 'success');
  } catch (e) { toast(t('dictionaries.saveFailed') + e.message, 'error'); }
}

async function deleteDictItem(id) {
  if (!confirm(t('dictionaries.confirmDelete'))) return;
  try {
    const resp = await fetch('/api/dictionaries/' + encodeURIComponent(id), {
      method: 'DELETE',
      headers: getAuthHeaders()
    });
    if (resp.ok) {
      await renderDictionaries();
      toast(t('dictionaries.deleteSuccess'), 'success');
    } else {
      const err = await resp.json();
      toast(t('dictionaries.deleteFailed') + (err.error || ''), 'error');
    }
  } catch (e) { toast(t('dictionaries.deleteFailed') + e.message, 'error'); }
}

function showDictAddForm() {
  const nameEl = document.getElementById('dict-add-name');
  const codeEl = document.getElementById('dict-add-code');
  const hintEl = document.getElementById('dict-add-name-hint');
  const submitBtn = document.getElementById('dict-add-submit');
  const titleEl = document.getElementById('dict-add-title');
  const parentRow = document.getElementById('dict-add-parent-row');
  const parentSel = document.getElementById('dict-add-parent');
  if (!nameEl) { console.error('dict-add modal not found'); return; }
  // 重置
  nameEl.value = '';
  codeEl.value = '';
  codeEl.readOnly = false;
  if (hintEl) { hintEl.style.display = 'none'; hintEl.textContent = ''; }
  if (titleEl) titleEl.textContent = t('dictionaries.modal.title');
  if (submitBtn) {
    submitBtn.disabled = false;
    submitBtn.textContent = t('dictionaries.btnSave') || '保存';
  }
  // 如果当前分类是 shop_customer,显示所属平台下拉
  if (parentRow && parentSel) {
    if (_dictCurrent === 'shop_customer') {
      const platformList = _dictCache['platform'] || [];
      let opts = '<option value="">' + esc(t('form.option.pleaseSelect')) + '</option>';
      platformList.forEach(p => {
        opts += '<option value="' + esc(p.code) + '">' + esc(_dictCurrentName(p)) + '</option>';
      });
      parentSel.innerHTML = opts;
      parentRow.style.display = '';
    } else {
      parentSel.innerHTML = '';
      parentRow.style.display = 'none';
    }
  }
  document.getElementById('dict-add-modal').classList.remove('hidden');
  setTimeout(() => nameEl.focus(), 50);
  // 名称输入时自动生成 code 提示
  nameEl.oninput = () => {
    const name = nameEl.value.trim();
    if (!name) { codeEl.value = ''; return; }
    // 只在用户没手动改过 code 时才覆盖
    if (!codeEl.dataset.touched) {
      codeEl.value = _dictSlugify(name);
    }
  };
  codeEl.oninput = () => { codeEl.dataset.touched = '1'; };
}

function closeDictAddForm() {
  const m = document.getElementById('dict-add-modal');
  if (m) m.classList.add('hidden');
  const nameEl = document.getElementById('dict-add-name');
  const codeEl = document.getElementById('dict-add-code');
  if (nameEl) nameEl.oninput = null;
  if (codeEl) { codeEl.oninput = null; codeEl.dataset.touched = ''; }
}

function _dictSlugify(s) {
  if (!s) return '';
  // 中文：pinyin 库不在前端；用时间戳后缀保证不重复
  const hasCJK = /[　-鿿]/.test(s);
  if (hasCJK) {
    // 留空,让后端用默认占位 / 由用户手动填
    return '';
  }
  return s.toLowerCase()
    .replace(/[^a-z0-9_]+/g, '_')
    .replace(/^_+|_+$/g, '')
    .slice(0, 40);
}

async function submitDictAddForm() {
  const nameEl = document.getElementById('dict-add-name');
  const codeEl = document.getElementById('dict-add-code');
  const submitBtn = document.getElementById('dict-add-submit');
  const hintEl = document.getElementById('dict-add-name-hint');
  const name = nameEl.value.trim();
  if (!name) {
    if (hintEl) { hintEl.textContent = t('dictionaries.nameRequired'); hintEl.style.display = 'block'; }
    nameEl.focus();
    return;
  }
  // 名称中含 CJK 时，code 不能为空且不能与现有重复
  const hasCJK = /[　-鿿]/.test(name);
  let code = codeEl.value.trim();
  if (!code) {
    if (hasCJK) {
      if (hintEl) { hintEl.textContent = t('dictionaries.codeRequired'); hintEl.style.display = 'block'; }
      codeEl.focus();
      return;
    }
    code = _dictSlugify(name);
  }
  if (!/^[a-zA-Z0-9_]+$/.test(code)) {
    if (hintEl) { hintEl.textContent = t('dictionaries.codeRequired'); hintEl.style.display = 'block'; }
    codeEl.focus();
    return;
  }
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = t('dictionaries.btnSave') + '…'; }
  // 如果是 shop_customer 分类,获取所选父平台
  let parentCode = '';
  if (_dictCurrent === 'shop_customer') {
    const parentSel = document.getElementById('dict-add-parent');
    if (parentSel) parentCode = parentSel.value || '';
  }
  await createDictItem(code, name, parentCode);
  if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = t('dictionaries.btnSave') || '保存'; }
}

async function createDictItem(code, name, parentCode) {
  try {
    const body = { category: _dictCurrent, code, label_zh: name, label_en: name, label_id: name, sort_order: 0, enabled: true };
    if (parentCode) body.parent_code = parentCode;
    const resp = await fetch('/api/dictionaries', {
      method: 'POST',
      headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      closeDictAddForm();
      await renderDictionaries();
      toast(t('dictionaries.addSuccess'), 'success');
    } else {
      const err = await resp.json().catch(() => ({}));
      toast(t('dictionaries.addFailed') + (err.error || ''), 'error');
    }
  } catch (e) { toast(t('dictionaries.addFailed') + e.message, 'error'); }
}

function toast(msg, type) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:6px;color:#fff;font-size:14px;z-index:10000;box-shadow:0 2px 8px rgba(0,0,0,.2)';
  div.style.background = type === 'error' ? '#e53935' : (type === 'success' ? '#2e7d32' : '#333');
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

// ==================== 字典选项加载（下拉用）====================
async function loadDictOptions(category, parentCode) {
  try {
    let url = '/api/dictionaries?category=' + encodeURIComponent(category);
    if (parentCode) url += '&parent_code=' + encodeURIComponent(parentCode);
    const resp = await fetch(url, { headers: getAuthHeaders() });
    const list = await resp.json() || [];
    return list.filter(d => d.enabled);
  } catch (e) { return []; }
}

function getDictLabel(item, lang) {
  if (!item) return '';
  if (!lang) {
    const loc = (window.__i18n && window.__i18n.getLocale) ? window.__i18n.getLocale() : 'zh-CN';
    if (loc === 'en-US') lang = 'en';
    else if (loc === 'id-ID') lang = 'id';
    else lang = 'zh';
  }
  if (lang === 'en') return item.label_en || item.label_zh || item.label_id || item.code;
  if (lang === 'id') return item.label_id || item.label_zh || item.label_en || item.code;
  return item.label_zh || item.label_en || item.label_id || item.code;
}

function fillDictSelect(selectEl, items, currentValue, lang) {
  if (!selectEl) return;
  const placeholder = selectEl.getAttribute('data-placeholder') || '请选择';
  let h = '<option value="">' + esc(placeholder) + '</option>';
  items.forEach(it => {
    const sel = (currentValue !== undefined && it.code === currentValue) ? ' selected' : '';
    h += '<option value="' + esc(it.code) + '"' + sel + '>' + esc(getDictLabel(it, lang)) + '</option>';
  });
  selectEl.innerHTML = h;
}

// ==================== 附件管理 ====================
async function uploadRecordAttachments(recordId, itemIndex, files, onProgress) {
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  fd.append('record_id', recordId);
  if (itemIndex !== null && itemIndex !== undefined) fd.append('item_index', String(itemIndex));
  // 注意: 不能带 Content-Type: application/json,否则浏览器不会设置 multipart/form-data 的 boundary,
  // 导致 multer 解析不到文件而上传失败。这里仅保留用户身份头,让浏览器自动设置 multipart 边界。
  const headers = getAuthHeaders();
  delete headers['Content-Type'];
  const resp = await fetch('/api/attachments/upload', {
    method: 'POST',
    headers,
    body: fd
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || t('form.atch.uploadFailed').replace('{message}', ''));
  }
  return await resp.json();
}

async function fetchRecordAttachments(recordId) {
  const resp = await fetch('/api/attachments/record/' + encodeURIComponent(recordId), { headers: getAuthHeaders() });
  if (!resp.ok) return [];
  return await resp.json();
}

async function deleteAttachment(id) {
  const resp = await fetch('/api/attachments/' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: getAuthHeaders()
  });
  return resp.ok;
}

function renderAttachmentChips(attachments, editable) {
  if (!attachments || attachments.length === 0) {
    return '<span class="atch-empty">' + t('form.atch.noAttachment') + '</span>';
  }
  let h = '<div class="atch-list">';
  attachments.forEach(a => {
    const isImg = /\.(jpe?g|png|gif|webp|bmp)$/i.test(a.original_name);
    h += '<span class="atch-chip" onclick="previewAttachment(\'' + esc(a.id) + '\',\'' + esc(a.mime_type) + '\',\'' + esc(a.original_name) + '\',\'' + esc(a.path) + '\')" title="' + esc(a.original_name) + '">';
    h += (isImg ? '🖼️ ' : '📄 ') + '<span class="atch-chip-name">' + esc(a.original_name) + '</span>';
    if (editable) h += '<span class="atch-chip-del" onclick="event.stopPropagation();handleDeleteAttachment(\'' + esc(a.id) + '\',this)" title="' + t('form.atch.delete') + '">×</span>';
    h += '</span>';
  });
  h += '</div>';
  return h;
}

async function handleDeleteAttachment(id, btnEl) {
  if (!confirm(t('form.atch.confirmDelete'))) return;
  if (await deleteAttachment(id)) {
    const listEl = btnEl.closest('.atch-list') || btnEl.closest('[data-attach-list]');
    if (listEl) {
      btnEl.closest('.atch-chip').remove();
      if (listEl.children.length === 0 && listEl.parentElement) {
        const old = listEl.parentElement;
        old.innerHTML = '<span class="atch-empty">' + t('form.atch.noAttachment') + '</span>';
      }
    }
    toast(t('form.atch.deleted'), 'success');
  } else {
    toast(t('form.atch.deleteFailed'), 'error');
  }
}

function previewAttachment(id, mime, name, path) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const isImg = /^(jpe?g|png|gif|webp|bmp)$/.test(ext);
  const isPdf = ext === 'pdf';
  const url = path;
  let body = '';
  if (isImg) {
    body = '<img src="' + esc(url) + '" alt="' + esc(name) + '">';
  } else if (isPdf) {
    body = '<iframe src="' + esc(url) + '" title="' + esc(name) + '"></iframe>';
  } else if (/^(docx?|xlsx?|pptx?)$/.test(ext)) {
    // 用 Google Docs Viewer 预览 Office 文件; 若已是绝对 URL(如 R2) 直接用, 否则拼本站 origin
    const viewerUrl = /^https?:\/\//i.test(url) ? url : location.origin + url;
    body = '<iframe src="https://docs.google.com/gview?url=' + encodeURIComponent(viewerUrl) + '&embedded=true" title="' + esc(name) + '"></iframe>';
  } else {
    body = '<div style="padding:40px;text-align:center"><p>' + t('form.atch.unsupportedPreview') + '</p><a href="' + esc(url) + '" download="' + esc(name) + '" style="color:var(--primary);text-decoration:underline">' + t('form.atch.downloadFile') + '</a></div>';
  }
  const ov = document.createElement('div');
  ov.className = 'atch-preview-overlay';
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = '<div class="atch-preview-box"><div class="atch-preview-bar"><span>📎 ' + esc(name) + '</span><div><a href="' + esc(url) + '" download="' + esc(name) + '" style="color:#333;text-decoration:underline;font-size:13px;margin-right:12px">' + t('form.atch.download') + '</a><button onclick="this.closest(\'.atch-preview-overlay\').remove()">' + t('form.atch.close') + '</button></div></div><div class="atch-preview-content">' + body + '</div></div>';
  document.body.appendChild(ov);
}
</script>
