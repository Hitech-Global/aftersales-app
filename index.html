<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="app.title" data-i18n-suffix=" v3.9.19"></title>
<script>
if (window.location.protocol === 'file:') {
  window.location.replace('http://localhost:3000/?admin');
}
</script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2e7d32;--primary-hover:#1b5e20;--primary-light:#e8f5e9;--success:#34c759;--warning:#ff9500;--danger:#ff3b30;--bg:#f5f6f8;--sidebar-bg:#1a2f1a;--sidebar-text:#b8c5b9;--sidebar-active:#2e7d32;--card-bg:#fff;--border:#e5e6eb;--text:#1f2329;--text-secondary:#646a73;--text-muted:#999;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-hover:0 4px 12px rgba(0,0,0,.12)}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* Layout */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:184px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sidebar-header{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;text-decoration:none}
.sidebar-brand .brand-icon{width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sidebar-group{margin-bottom:16px}
.sidebar-group-title{font-size:11px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:0 12px;margin-bottom:6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--sidebar-text);margin-bottom:2px}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:var(--sidebar-active);color:#fff}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;color:rgba(255,255,255,.4);text-align:center}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:56px;background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:18px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:16px}
.user-menu{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 12px;border-radius:6px;transition:background .2s;position:relative}
.user-menu:hover{background:var(--bg)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.user-info{display:flex;flex-direction:column;line-height:1.2}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:11px;color:var(--text-muted)}
.logout-btn{color:var(--text-muted);font-size:13px;cursor:pointer;border:none;background:none;padding:6px 10px;border-radius:6px}
.logout-btn:hover{background:var(--bg);color:var(--danger)}

.content{flex:1;overflow-y:auto;padding:20px}
.content-inner{max-width:none;margin:0 auto;padding:0 4px}

.flash{display:none;padding:12px 18px;border-radius:var(--radius);margin-bottom:16px;font-size:14px;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.flash.show{display:block}
.flash-success{background:#e8f8ef;color:#1a7a3a;border:1px solid #b7ebc3}
.flash-danger{background:#fde8e8;color:#c53030;border:1px solid #fbb}
.flash-warning{background:#fff8e6;color:#9a6d0a;border:1px solid #ffe3a3}
.flash-info{background:#e6f0ff;color:#2b5fbf;border:1px solid #b3d4ff}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-header h2{font-size:20px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s;text-decoration:none;white-space:nowrap;font-family:inherit}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--card-bg);color:var(--text-secondary);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-success{background:#2e7d32;color:#fff}
.btn-success:hover{background:#1b5e20}
.table-section-actions{display:flex;gap:8px;align-items:center}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#d32f2f}
.btn-search{background:var(--primary);color:#fff;border:none}
.btn-clear{background:none;color:var(--text-muted);border-color:var(--border)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-lg{padding:12px 28px;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.stats-grid{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:120px;background:var(--card-bg);border-radius:var(--radius);padding:12px 16px;text-align:center;box-shadow:var(--shadow);transition:all .2s;cursor:pointer;border:2px solid transparent;color:var(--text)}
.stat-card:hover{box-shadow:var(--shadow-hover);border-color:var(--primary);transform:translateY(-2px)}
.stat-card.active{border-color:var(--primary);background:var(--primary-light)}
.table-section{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.table-section-title{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--card-bg)}
.table-section-title-left{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:var(--text)}
.table-section-icon{font-size:18px}
.table-section-title .btn{min-height:36px;padding:8px 18px}
.stat-number{font-size:24px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:2px}

.filter-bar{margin-bottom:20px;background:var(--card-bg);padding:16px;border-radius:var(--radius);box-shadow:var(--shadow);position:relative;z-index:1}
.prod-batch-bar{margin-bottom:20px;background:#fff3e0;border:1px solid #ffb74d;padding:12px 16px;border-radius:var(--radius);box-shadow:var(--shadow);display:none;position:relative;z-index:2}
.prod-batch-bar .batch-inner{display:flex;align-items:center;gap:16px;width:100%}
.prod-batch-bar .batch-count{font-weight:600;color:#e65100}
.filter-bar .btn,.prod-batch-bar .btn{pointer-events:auto}
.filter-form{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:104px}
.filter-group.date-filter{flex:0 0 auto;width:140px}
.filter-group label{font-size:12px;color:var(--text-secondary);font-weight:500}
.search-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.search-input:focus,.filter-select:focus,.date-input:focus,.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(46,125,50,.12)}
.filter-select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--card-bg);outline:none;cursor:pointer;font-family:inherit}
.date-picker-wrap{position:relative;display:flex;align-items:center;width:100%}
.date-input{width:100%;padding:8px 38px 8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;background:var(--card-bg);cursor:pointer}
.date-picker-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:28px;height:28px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:6px;font-size:15px;line-height:1}
.date-picker-btn:hover{background:var(--primary-light);color:var(--primary)}
.custom-date-panel{position:absolute;top:calc(100% + 6px);right:0;z-index:450;width:258px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;box-shadow:0 14px 36px rgba(0,0,0,.18);padding:10px;display:none}
.custom-date-panel.open{display:block}
.custom-date-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.custom-date-title{font-size:13px;font-weight:600;color:var(--text)}
.custom-date-nav{display:flex;gap:4px}
.custom-date-nav button{width:26px;height:26px;border:1px solid var(--border);background:var(--card-bg);border-radius:6px;cursor:pointer;color:var(--text-secondary);font-size:14px}
.custom-date-nav button:hover{background:var(--primary-light);color:var(--primary)}
.custom-date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.custom-date-weekday{height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);font-weight:600}
.custom-date-day{height:30px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text)}
.custom-date-day:hover{background:var(--primary-light);color:var(--primary)}
.custom-date-day.muted{color:var(--text-muted);opacity:.55}
.custom-date-day.today{border:1px solid var(--primary)}
.custom-date-day.selected{background:var(--primary);color:#fff;font-weight:600}
.custom-date-footer{display:flex;justify-content:space-between;margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.custom-date-footer button{border:none;background:transparent;color:var(--primary);font-size:12px;cursor:pointer;padding:4px 6px;border-radius:4px}
.custom-date-footer button:hover{background:var(--primary-light)}
.filter-actions{display:flex;gap:8px}

.table-container{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
.data-table thead{background:#fafbfc;border-bottom:2px solid var(--border)}
.data-table th{padding:10px 12px;text-align:left;font-weight:600;color:var(--text-secondary);font-size:12px;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.data-table tbody tr:hover{background:#f8f9ff}
.data-table tbody tr.row-clickable{cursor:pointer}
.data-table tbody tr.row-clickable:hover{background:#eef5ff}
.data-table tbody tr:last-child td{border-bottom:none}
.cell-id{color:var(--text-muted);font-family:monospace;font-size:12px}
.cell-name{font-weight:500}
.cell-desc{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-date{font-size:12px;color:var(--text-muted);white-space:nowrap}
.cell-actions{white-space:nowrap}
.action-btn{background:none;border:none;cursor:pointer;padding:4px 6px;font-size:16px;opacity:.6;transition:opacity .2s;font-family:inherit}
.action-btn:hover{opacity:1}
.action-delete:hover{color:var(--danger)}
.toast-container{position:fixed;top:72px;right:20px;z-index:500;display:flex;flex-direction:column;gap:10px;pointer-events:none;max-width:min(420px,calc(100vw - 32px))}
.toast{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);background:var(--card-bg);border-left:4px solid var(--primary);font-size:13px;line-height:1.45;color:var(--text);pointer-events:auto;animation:toastIn .18s ease-out}
.toast-success{border-left-color:var(--success)}
.toast-danger{border-left-color:var(--danger)}
.toast-warning{border-left-color:var(--warning)}
.toast-info{border-left-color:var(--primary)}
.toast-message{flex:1}
.toast-close{border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;padding:0 0 0 8px}
@keyframes toastIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;white-space:nowrap}
.status-草稿{background:#f5f5f5;color:#757575}
.status-待一级审批{background:#fff3e0;color:#e65100}
.status-一级审批通过{background:#e8f5e9;color:#2e7d32}
.status-待二级审批{background:#fff8e1;color:#f9a825}
.status-二级审批通过{background:#e8f5e9;color:#2e7d32}
.status-待三级审批{background:#fce4ec;color:#c62828}
.status-审批通过{background:#e8f5e9;color:#1b5e20}
.status-审批拒绝{background:#fde8e8;color:#b71c1c}
.category-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;background:#f0f0f0;color:var(--text-secondary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow)}
.empty-icon{font-size:48px;margin-bottom:12px}
.page-info{margin-top:16px;font-size:13px;color:var(--text-muted)}

.form-container{max-width:800px}
.record-form{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
.form-section{border:none;margin-bottom:24px;padding:0}
.form-section legend{font-size:16px;font-weight:600;padding-bottom:12px;margin-bottom:16px;border-bottom:1px solid var(--border);width:100%}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group-full{grid-column:1/-1}
.form-group label{font-size:14px;font-weight:500;color:var(--text-secondary)}
.required{color:var(--danger)}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--card-bg);width:100%}
.approval-flow-preview{margin-top:10px;padding:12px 14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.approval-flow-preview .afp-node{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;font-size:12px}
.approval-flow-preview .afp-node .afp-lvl{font-size:10px;font-weight:600;color:var(--text-muted);background:var(--bg-secondary);padding:2px 6px;border-radius:8px}
.approval-flow-preview .afp-node.missing{opacity:.55;background:transparent}
.approval-flow-preview .afp-arrow{color:var(--text-muted);font-size:12px}
.approval-flow-card{margin-top:6px;padding:12px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;display:block}
.afc-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.afc-icon{font-size:18px;line-height:1}
.afc-name{font-size:14px;font-weight:600;color:var(--text)}
.afc-tag{font-size:11px;padding:2px 8px;background:var(--primary);color:#fff;border-radius:10px;font-weight:500}
.approval-flow-card.empty{padding:14px;text-align:center;color:var(--text-muted);font-size:13px;background:var(--bg-secondary)}
.approval-flow-card.empty .afc-name{font-weight:500}
input[readonly]{background:#f5f6f8;color:var(--text-secondary)}
.form-actions{display:flex;gap:12px;margin-top:8px}

.detail-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
.detail-section{margin-bottom:24px}
.detail-section:last-child{margin-bottom:0}
.detail-section h3{font-size:15px;font-weight:600;color:var(--text-secondary);padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.detail-item{display:flex;flex-direction:column;gap:4px}
.detail-label{font-size:12px;color:var(--text-muted);text-transform:uppercase}
.detail-value{font-size:14px;color:var(--text);word-break:break-all}
.detail-text{font-size:14px;line-height:1.8;white-space:pre-wrap;background:var(--bg);padding:14px;border-radius:6px}

/* Login page */
.login-page{background:linear-gradient(135deg,#1b5e20 0%,#2e7d32 100%);display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-container{width:100%;max-width:440px;padding:20px}
.login-card{background:var(--card-bg);border-radius:16px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
.login-card h1{font-size:24px;margin-bottom:8px}
.login-card p{color:var(--text-secondary);font-size:14px;margin-bottom:24px}
.login-card input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:14px;outline:none;font-family:inherit}
.login-card input:focus{border-color:var(--primary)}
.login-card button{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.login-card button:hover{background:var(--primary-hover)}
.login-hint{background:#fafbfc;border:1px dashed var(--border);border-radius:8px;padding:14px;margin-top:20px;font-size:12px;color:var(--text-secondary);text-align:left}
.login-tabs{display:flex;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.login-tab{flex:1;padding:10px;border:none;background:#fafbfc;font-size:14px;cursor:pointer;color:var(--text-secondary);font-family:inherit;transition:all .2s}
.login-tab.active{background:var(--primary);color:#fff;font-weight:500}
.login-tab:hover:not(.active){background:#eee}

/* Feishu contacts search dropdown */
.feishu-contact-search{position:relative}
.feishu-contact-search input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box}
.feishu-contact-search input:focus{border-color:var(--primary)}
.feishu-search-dropdown{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--card-bg);border:1px solid var(--border);border-radius:0 0 8px 8px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:240px;overflow-y:auto}
.feishu-search-dropdown .fs-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background .15s}
.feishu-search-dropdown .fs-item:hover{background:#f5f6fa}
.feishu-search-dropdown .fs-item:last-child{border-bottom:none}
.feishu-search-dropdown .fs-avatar{width:32px;height:32px;border-radius:50%;background:#e0e4f0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#5a6a8a;flex-shrink:0;overflow:hidden}
.feishu-search-dropdown .fs-avatar img{width:100%;height:100%;object-fit:cover}
.feishu-search-dropdown .fs-info{flex:1;min-width:0}
.feishu-search-dropdown .fs-name{font-size:14px;font-weight:500}
.feishu-search-dropdown .fs-dept{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feishu-search-dropdown .fs-empty{padding:14px;text-align:center;color:var(--text-muted);font-size:13px}
.feishu-search-dropdown .fs-loading{padding:14px;text-align:center;color:var(--text-muted);font-size:13px}
.feishu-search-loading-indicator{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;display:none}
.login-loading{display:none;align-items:center;justify-content:center;gap:8px;padding:14px;font-size:14px;color:var(--text-secondary)}
.login-loading .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-feishu-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;background:#3370ff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;transition:background .2s}
.login-feishu-btn:hover{background:#2860e0}
.login-feishu-btn .feishu-icon{font-size:20px}
.login-divider{display:flex;align-items:center;margin:20px 0;color:var(--text-muted);font-size:12px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-divider span{padding:0 12px}
.login-error{display:none;padding:10px 14px;background:#fde8e8;color:#c53030;border-radius:8px;margin-bottom:16px;font-size:13px;text-align:left}
.login-feishu-info{background:#e8f2ff;border:1px solid #b3d4ff;border-radius:8px;padding:10px;margin-top:16px;font-size:12px;color:#2b5fbf;text-align:left}
.login-feishu-info strong{display:block;margin-bottom:4px}

/* Overview page */
.ov-filter-bar{display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap;background:var(--card-bg);padding:16px 20px;border-radius:var(--radius);box-shadow:var(--shadow)}
.ov-filter-group{display:flex;flex-direction:column;gap:4px}
.ov-filter-group label{font-size:12px;color:var(--text-secondary);font-weight:500}
.ov-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.ov-summary-card{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;text-align:center;box-shadow:var(--shadow)}
.ov-summary-card .ov-card-icon{font-size:28px;margin-bottom:8px}
.ov-summary-card .ov-card-value{font-size:32px;font-weight:700;color:var(--text);margin-bottom:4px}
.ov-summary-card .ov-card-label{font-size:13px;color:var(--text-secondary)}
.ov-summary-card.card-total .ov-card-value{color:var(--primary)}
.ov-summary-card.card-return .ov-card-value{color:#e65100}
.ov-summary-card.card-rate .ov-card-value{color:#1565c0}
.ov-section{margin-bottom:24px}
.ov-section-title{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ov-section-title .badge{font-size:12px;padding:2px 8px;border-radius:10px;background:#e3f2fd;color:#1565c0}
.ov-brand-table{width:100%;border-collapse:collapse;background:var(--card-bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.ov-brand-table thead{background:#fafbfc;border-bottom:2px solid var(--border)}
.ov-brand-table th{padding:12px 16px;text-align:left;font-weight:600;color:var(--text-secondary);font-size:13px;white-space:nowrap}
.ov-brand-table th.right,.ov-brand-table td.right{text-align:right}
.ov-brand-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
.ov-brand-table tbody tr:hover{background:#f8f9ff}
.ov-brand-table tbody tr:last-child td{border-bottom:none}
.ov-brand-name{font-weight:600;display:flex;align-items:center;gap:8px}
.ov-brand-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rate-indicator{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;white-space:nowrap}
.rate-good{background:#e8f5e9;color:#2e7d32}
.rate-warn{background:#fff3e0;color:#e65100}
.rate-bad{background:#fde8e8;color:#c53030}
.rate-na{background:#f5f5f5;color:#999}
.ov-action-bar{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.file-input-hidden{display:none}
.ov-empty{text-align:center;padding:60px 20px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);color:var(--text-secondary)}

/* User/Role management */
.permission-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}
.permission-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:6px;cursor:pointer;transition:background .2s}
.permission-item:hover{background:#e8f5e9}
.permission-item input{cursor:pointer}
.permission-item label{flex:1;cursor:pointer;font-size:13px}
.permission-desc{font-size:11px;color:var(--text-muted);display:block}
.role-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;background:#e3f2fd;color:#1565c0}
.user-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500}
.user-status-active{background:#e8f5e9;color:#2e7d32}
.user-status-disabled{background:#f5f5f5;color:#757575}
.country-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;background:#e3f2fd;color:#1565c0}

/* Product status badge */
.prod-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500}
.prod-status-active{background:#e8f5e9;color:#2e7d32}
.prod-status-disabled{background:#f5f5f5;color:#757575}

/* Approval timeline */
.approval-timeline{position:relative;padding-left:24px}
.approval-timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.approval-timeline-item{position:relative;margin-bottom:16px;padding:12px 14px;background:var(--bg);border-radius:6px;border-left:3px solid var(--primary)}
.approval-timeline-item::before{content:'';position:absolute;left:-26px;top:16px;width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid #fff;box-shadow:0 0 0 2px var(--primary)}
.approval-timeline-item.rejected{border-left-color:var(--danger)}
.approval-timeline-item.rejected::before{background:var(--danger);box-shadow:0 0 0 2px var(--danger)}

/* Attachment area */
.attachment-thumb{transition:transform .2s;cursor:pointer}
.attachment-thumb:hover{transform:scale(1.05)}
.attachment-upload-area{border:2px dashed var(--border);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:border .2s}
.attachment-upload-area:hover{border-color:var(--primary)}

/* Pagination */
.pagination{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:16px}
.pagination-btn{padding:6px 12px;border:1px solid var(--border);background:var(--card-bg);border-radius:6px;cursor:pointer;font-size:13px}
.pagination-btn:hover{background:var(--bg)}
.pagination-btn:disabled{opacity:.5;cursor:not-allowed}
.pagination-info{font-size:13px;color:var(--text-secondary)}
.page-size-select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card-bg)}

.hidden{display:none!important}
.page{display:none}
.page.active{display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.modal-overlay.hidden{display:none}
.modal-panel{background:var(--card-bg);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.18);width:100%;max-width:520px;animation:modalIn .2s ease}
.modal-panel.modal-large{max-width:780px}
.modal-panel.modal-xlarge{max-width:960px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{margin:0;font-size:18px}
.modal-close{background:none;border:none;font-size:24px;color:var(--text-muted);cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px;max-height:70vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

/* Detail items table in form */
/* 表格列宽合计 100%, 不需要横向滚动; 设为 visible 避免成为滚动容器, 否则 sticky 表头相对它定位会失效 */
.detail-items-table-wrapper{overflow:visible}
.detail-items-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.detail-items-table thead{background:#fafbfc;border-bottom:2px solid var(--border)}
/* 表头固定: 滚动时吸附在内容区顶部, 与输入行用阴影清晰分隔, 不再视觉重叠 */
.detail-items-table th{position:sticky;top:0;z-index:5;background:#fafbfc;padding:10px 6px;text-align:left;font-weight:600;color:var(--text-secondary);font-size:12px;white-space:nowrap;box-shadow:0 2px 4px rgba(0,0,0,.06)}
.detail-items-table td{padding:6px;border-bottom:1px solid var(--border);vertical-align:top}
/* 全局:强制所有原生下拉控件在浅色页面下使用浅色外观,避免 macOS/浏览器深色模式下弹窗变深灰 */
select{color-scheme:light}
select option{background:var(--card-bg);color:var(--text)}
.detail-items-table input,.detail-items-table select{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:inherit;outline:none;background:var(--card-bg);color:var(--text);box-sizing:border-box;color-scheme:light}
.detail-items-table input:focus,.detail-items-table select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(46,125,50,.1)}
/* 强制原生下拉弹窗在浅色页面下使用浅色背景,避免 macOS/浏览器深色模式下出现深灰弹窗与页面风格冲突 */
.detail-items-table select option{background:var(--card-bg);color:var(--text)}
.detail-items-table .qty-input{text-align:center}
.detail-items-table .btn-delete-row{background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:4px 6px;line-height:1;border-radius:4px}
/* ===== 新建售后记录 - 主内容区全屏弹窗(不覆盖左侧导航栏,覆盖右侧整个内容区) ===== */
.record-fs-overlay{position:fixed;top:56px;right:0;bottom:0;left:220px;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.record-fs-overlay.hidden{display:none}
.record-fs-panel{display:flex;flex-direction:column;width:100%;height:100%;background:var(--card-bg)}
.record-fs-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--card-bg)}
.record-fs-header h3{margin:0;font-size:18px}
.record-fs-body{flex:1 1 auto;overflow-y:auto;padding:24px 24px 90px}
.record-fs-footer{flex-shrink:0;display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid var(--border);background:var(--card-bg)}
/* 全屏弹窗内的 select 强制浅色渲染,确保原生下拉弹窗不因 overflow 裁切后显示异常 */
.record-fs-panel select{color-scheme:light!important;-webkit-color-scheme:light!important}
.record-fs-panel select option{background:#fff;color:#1f2329}
/* 离线渠道店铺/客户自动补全输入框 */
.shop-ac-wrap{position:relative}
.shop-autocomplete{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:inherit;outline:none;background:var(--card-bg);color:var(--text);box-sizing:border-box}
.shop-autocomplete:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(46,125,50,.1)}
/* 下拉框挂到 body, 用 JS 设 position:fixed + 视口坐标, 脱离表格/滚动容器/弹窗的 overflow 裁剪, 永远显示在最上层 */
.shop-ac-dropdown{position:fixed;z-index:99999;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.18);max-height:260px;overflow-y:auto}
.shop-ac-dropdown.hidden{display:none}
.shop-ac-item{padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop-ac-item:last-child{border-bottom:none}
.shop-ac-item:hover,.shop-ac-item.active{background:var(--primary-light)}
.shop-ac-sub{color:var(--text-muted);font-size:11px;margin-left:6px}
.shop-ac-empty{padding:10px;color:var(--text-muted);font-size:13px}
/* SKU 自动补全下拉 */
.sku-ac-dropdown{position:fixed;z-index:99999;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.18);max-height:260px;overflow-y:auto;min-width:180px}
.sku-ac-dropdown.hidden{display:none}
.sku-ac-item{padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.sku-ac-item:last-child{border-bottom:none}
.sku-ac-item:hover,.sku-ac-item.active{background:var(--primary-light)}
.sku-ac-main{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sku-ac-sub{color:var(--text-muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sku-ac-empty{padding:10px;color:var(--text-muted);font-size:13px}
.detail-items-table .btn-delete-row:hover{background:#fde8e8}

@media(max-width:768px){
  .sidebar{width:0;overflow:hidden}
  .record-fs-overlay{left:0}
  .stats-grid{flex-wrap:wrap}.stat-card{flex:1 1 calc(50% - 4px);min-width:80px}
  .filter-form{flex-direction:column;align-items:stretch}
  .filter-actions{width:100%;justify-content:flex-end}
  .form-grid{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}
  .ov-summary{grid-template-columns:repeat(2,1fr)}
  .ov-risk-row{grid-template-columns:repeat(2,1fr)}
  .ov-filter-bar{flex-direction:column;align-items:stretch}
  .permission-grid{grid-template-columns:1fr}
}
/* 处理状态徽章 */
.ps-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.ps-待ERP入库{background:#e3f2fd;color:#1565c0}
.ps-待换彩盒{background:#fff3e0;color:#e65100}
.ps-待补配件{background:#f3e5f5;color:#7b1fa2}
.ps-待RMA{background:#fce4ec;color:#c62828}
.ps-待报废{background:#efebe9;color:#5d4037}
.ps-已处理{background:#e8f5e9;color:#2e7d32}
/* 批量操作栏 */
.batch-bar{display:none;align-items:center;gap:12px;padding:12px 20px;background:var(--primary-light);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap}
.batch-bar.show{display:flex}
.batch-bar .batch-info{font-size:14px;font-weight:500;color:var(--primary)}
/* 图表容器 */
.chart-container{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.chart-wrapper{position:relative;height:260px}
.ov-charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
/* 概览处理状态卡片 */
.ov-process-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.ov-process-card{background:var(--card-bg);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow);border-top:3px solid var(--primary)}
.ov-process-card .ov-ps-value{font-size:22px;font-weight:700;color:var(--text)}
.ov-process-card .ov-ps-label{font-size:11px;color:var(--text-secondary)}
.ov-metric-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.ov-risk-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.ov-click-card{cursor:pointer;transition:transform .18s,box-shadow .18s}
.ov-click-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.ov-recent{margin-top:24px}
.ov-recent-item{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border,#eee);cursor:pointer;font-size:14px}
.ov-recent-item:last-child{border-bottom:none}
.ov-recent-item:hover{background:var(--hover-bg,#f6f8fa)}
.ov-recent-id{font-weight:700;color:var(--primary)}
.ov-recent-date{color:var(--text-secondary);min-width:96px}
.ov-recent-status{flex:1;color:var(--text)}
.ov-recent-submitter{color:var(--text-secondary);min-width:80px;text-align:right}
/* 明细模式表格 */
.data-table .col-checkbox{width:36px;text-align:center}
.data-table .col-checkbox input{cursor:pointer}
.view-mode-toggle{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.view-mode-toggle button{padding:4px 12px;border:none;background:transparent;font-size:13px;cursor:pointer;color:var(--text-secondary)}
.view-mode-toggle button.active{background:var(--primary);color:#fff}
/* ERP截图 */
.erp-screenshot-thumb{width:48px;height:48px;border:1px solid var(--border);border-radius:4px;object-fit:cover;cursor:pointer}
.erp-upload-btn{font-size:11px;color:var(--primary);cursor:pointer;text-decoration:underline}
.btn-sm{padding:4px 10px;font-size:12px}
/* 审批流管理 */
.af-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.af-stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center}
.af-stat-num{font-size:22px;font-weight:700}
.af-stat-label{font-size:12px;color:var(--text-muted);margin-top:4px}
.af-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.af-table{width:100%;border-collapse:collapse;font-size:13px}
.af-table th{padding:10px 16px;text-align:left;font-weight:600;background:var(--bg-alt);border-bottom:1px solid var(--border);white-space:nowrap}
.af-table td{padding:10px 16px;border-bottom:1px solid var(--border)}
.af-table tr{cursor:pointer;transition:background .15s}
.af-table tr:hover{background:var(--bg-alt)}
.af-table tr.selected{background:rgba(46,125,50,.08)}
.af-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.af-badge-on{background:rgba(46,125,50,.12);color:var(--primary)}
.af-badge-off{background:rgba(0,0,0,.08);color:var(--text-muted)}
.af-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.af-btn-primary{background:var(--primary);color:#fff}
.af-btn-primary:hover{background:var(--primary-dark)}
.af-btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.af-btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.af-btn-sm{padding:3px 10px;font-size:12px}
.af-btn-danger{background:transparent;border:1px solid #e53935;color:#e53935}
.af-btn-danger:hover{background:#e53935;color:#fff}
.af-flow-container{display:flex;align-items:center;gap:0;padding:24px 20px;overflow-x:auto;min-height:120px}
.af-flow-node{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:120px;padding:14px 18px;border:2px solid var(--border);border-radius:10px;background:var(--card-bg);cursor:pointer;transition:all .2s;text-align:center}
.af-flow-node:hover{border-color:var(--primary)}
.af-flow-node.active{border-color:var(--primary);background:rgba(46,125,50,.05);box-shadow:0 2px 8px rgba(46,125,50,.15)}
.af-flow-node-start,.af-flow-node-end{border-style:dashed;color:var(--text-muted)}
.af-flow-level-tag{display:inline-block;padding:1px 8px;border-radius:10px;background:var(--primary);color:#fff;font-size:10px;font-weight:600;margin-bottom:4px}
.af-flow-arrow{font-size:20px;color:var(--text-muted);padding:0 6px;flex-shrink:0}
.af-config-panel{padding:20px;border-top:1px solid var(--border)}
.af-config-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.af-config-label{width:100px;font-size:13px;color:var(--text-secondary);flex-shrink:0;text-align:right}
.af-config-input,.af-config-select{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card-bg);color:var(--text)}
.af-config-input:focus,.af-config-select:focus{outline:none;border-color:var(--primary)}
.af-config-hint{font-size:11px;color:var(--text-muted);margin-top:4px;margin-left:112px}
.af-toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s}
.af-toggle-on{background:var(--primary)}
.af-toggle-off{background:var(--border)}
.af-toggle-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.af-toggle-on .af-toggle-knob{left:18px}
.af-toggle-off .af-toggle-knob{left:2px}
.af-node-actions{display:flex;gap:4px;flex-shrink:0}
.af-empty{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}
/* 字典管理 */
.dict-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;min-height:500px}
.dict-sidebar{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:12px;height:fit-content}
.dict-sidebar-title{font-size:13px;font-weight:600;color:var(--text-secondary);padding:4px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.dict-cat-item{padding:10px 12px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:space-between;transition:all .15s;margin-bottom:2px}
.dict-cat-item:hover{background:var(--bg-alt)}
.dict-cat-item.active{background:rgba(46,125,50,.1);color:var(--primary);font-weight:600}
.dict-cat-count{font-size:11px;background:var(--bg-alt);color:var(--text-muted);padding:1px 6px;border-radius:8px}
.dict-cat-item.active .dict-cat-count{background:var(--primary);color:#fff}
.dict-main{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.dict-main-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.dict-table{width:100%;border-collapse:collapse;font-size:13px}
.dict-table th{padding:10px 14px;text-align:left;font-weight:600;background:var(--bg-alt);border-bottom:1px solid var(--border);white-space:nowrap}
.dict-table td{padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.dict-table tr:last-child td{border-bottom:none}
.dict-input{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;width:100%;background:var(--card-bg);color:var(--text)}
.dict-input:focus{outline:none;border-color:var(--primary)}
.dict-actions-cell{display:flex;gap:4px}
/* 附件上传 */
.atch-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.atch-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg-alt);border:1px solid var(--border);border-radius:4px;font-size:12px;max-width:180px;cursor:pointer}
.atch-chip:hover{border-color:var(--primary)}
.atch-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.atch-chip-del{color:#e53935;cursor:pointer;font-weight:bold;padding:0 2px}
.atch-upload-btn{font-size:12px;color:var(--primary);cursor:pointer;text-decoration:underline;display:inline-flex;align-items:center;gap:3px;padding:2px 6px}
.atch-upload-btn:hover{color:var(--primary-dark)}
.atch-preview-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.atch-preview-box{background:#fff;border-radius:8px;max-width:90%;max-height:90%;display:flex;flex-direction:column;overflow:hidden}
.atch-preview-bar{padding:8px 12px;background:#f5f5f5;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ddd;font-size:13px}
.atch-preview-bar button{background:none;border:1px solid #ddd;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:4px}
.atch-preview-content{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#fafafa}
.atch-preview-content img{max-width:100%;max-height:80vh;object-fit:contain}
.atch-preview-content iframe{width:80vw;height:80vh;border:none;background:#fff}
.atch-empty{font-size:12px;color:var(--text-muted);font-style:italic}
</style>
</head>
<body>

<!-- Login Page -->
<div id="page-login" class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1>&#x1F4CB; <span data-i18n="app.title"></span></h1>
      <p data-i18n="login.subtitle"></p>

      <!-- 加载中 -->
      <div class="login-loading" id="login-loading" style="display:flex">
        <span class="spinner"></span> <span data-i18n="login.verifying"></span>
      </div>

      <!-- 错误提示 -->
      <div class="login-error" id="login-error"></div>

      <!-- 飞书登录面板 -->
      <div id="login-panel-feishu" style="display:none">
        <div id="login-feishu-status" style="margin-bottom:16px;">
          <!-- 动态填充：飞书配置状态 -->
        </div>
        <button class="login-feishu-btn" id="btn-feishu-login" onclick="initiateFeishuLogin()" style="display:none">
          <span class="feishu-icon">&#x1F4E8;</span> <span data-i18n="login.btnFeishu"></span>
        </button>
        <div id="login-feishu-hint" class="login-feishu-info" style="display:none">
          <strong>&#x26A0; <span data-i18n="login.localModeHint"></span></strong>
          <span data-i18n="login.localAccountLoginHint"></span>
        </div>
        <div id="login-feishu-ready" class="login-feishu-info" style="display:none">
          <span data-i18n="login.feishuOnlyHint"></span>
        </div>
      </div>

      <!-- 本地登录 -->
      <div id="login-panel-admin" style="display:none; margin-top:20px; padding-top:16px; border-top:1px dashed var(--border)">
        <input type="text" id="login-username" data-i18n-placeholder="login.usernamePlaceholder" autofocus>
        <input type="password" id="login-password" data-i18n-placeholder="login.passwordPlaceholder" onkeydown="if(event.key==='Enter')adminLogin()">
        <button onclick="adminLogin()" style="width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit" data-i18n="login.btnLocal"></button>
      </div>
    </div>
  </div>
</div>

<!-- App Shell -->
<div id="app-shell" class="app-shell hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-brand"><span class="brand-icon">&#x1F4CB;</span><span data-i18n="app.sidebarBrand"></span></a>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer" id="sidebar-footer">v3.9.3 Render Latest &middot; <span id="feishu-status-dot" style="color:#4caf50;font-size:10px">&#x25CF;</span> <span id="feishu-status-text" data-i18n="app.mode.cloud"></span></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="topbar-title" data-i18n="page.title.overview"></h1>
      </div>
      <div class="topbar-right">
        <div class="lang-switcher" style="position:relative;margin-right:4px">
          <select id="lang-select" onchange="switchLanguage(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card-bg);cursor:pointer;font-family:inherit;outline:none">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
            <option value="id-ID">Bahasa Indonesia</option>
          </select>
        </div>
        <div class="user-menu">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="user-info">
            <span class="user-name" id="user-name">--</span>
            <span class="user-role" id="user-role">--</span>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()" id="btn-logout" data-i18n="app.logout"></button>
      </div>
    </header>

    <div class="content">
      <div class="content-inner">
        <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

        <!-- 售后概览 -->
        <div id="page-overview" class="page">
          <div class="ov-filter-bar">
            <div class="ov-filter-group">
              <label data-i18n="overview.filter.startDate"></label>
              <input type="text" class="date-input" id="ov-start-date" inputmode="numeric" onblur="normalizeDateInput(this);renderOverview()" onchange="normalizeDateInput(this);renderOverview()">
            </div>
            <div class="ov-filter-group">
              <label data-i18n="overview.filter.endDate"></label>
              <input type="text" class="date-input" id="ov-end-date" inputmode="numeric" onblur="normalizeDateInput(this);renderOverview()" onchange="normalizeDateInput(this);renderOverview()">
            </div>
            <div class="ov-filter-group">
              <label data-i18n="overview.filter.brand"></label>
              <select class="filter-select" id="ov-brand-filter" onchange="renderOverview()"><option value="" data-i18n="overview.filter.allBrands"></option></select>
            </div>
            <button class="btn btn-secondary" onclick="resetOverviewFilter()" data-i18n="overview.btnReset"></button>
          </div>
          <div class="ov-summary" id="ov-summary"></div>
          <div class="ov-risk-row" id="ov-risk-row"></div>
          <div class="chart-container">
            <div class="ov-section-title" data-i18n="overview.chart.trend30"></div>
            <div class="chart-wrapper" id="chart-trend-30-wrapper"><canvas id="chart-trend-30"></canvas></div>
          </div>
          <div class="ov-charts-row">
            <div class="chart-container">
              <div class="ov-section-title" data-i18n="overview.chart.reasonTop5"></div>
              <div class="chart-wrapper" id="chart-reason-top5-wrapper"><canvas id="chart-reason-top5"></canvas></div>
            </div>
            <div class="chart-container">
              <div class="ov-section-title" data-i18n="overview.chart.skuTop10"></div>
              <div class="chart-wrapper" id="chart-sku-top10-wrapper"><canvas id="chart-sku-top10"></canvas></div>
            </div>
          </div>
          <div class="ov-recent" id="ov-recent"></div>
        </div>

        <!-- 售后列表 -->
        <div id="page-list" class="page">
          <div class="page-header">
            <h2 data-i18n="list.title"></h2>
            <div style="display:flex;gap:10px;align-items:center">
              <button class="btn btn-secondary" id="btn-export-list" onclick="exportAftersalesExcel()" data-i18n="list.btnExport"></button>
            </div>
          </div>
          <div class="filter-bar">
            <div class="filter-form">
              <div class="filter-group">
                <label data-i18n="list.filter.brand"></label>
                <select class="filter-select" id="brand-filter" onchange="renderList()"><option value="" data-i18n="list.filter.allBrands"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="list.filter.channel"></label>
                <select class="filter-select" id="channel-filter" onchange="renderList()"><option value="" data-i18n="list.filter.allChannels"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="list.filter.approvalStatus"></label>
                <select class="filter-select" id="status-filter" onchange="renderList()"><option value="" data-i18n="list.filter.allApprovalStatus"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="list.filter.returnReason"></label>
                <select class="filter-select" id="return-reason-filter" onchange="renderList()"><option value="" data-i18n="list.filter.allReturnReasons"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="list.filter.processProgress"></label>
                <select class="filter-select" id="process-progress-filter" onchange="renderList()"><option value="" data-i18n="list.filter.allProcessProgress"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="list.filter.risk"></label>
                <select class="filter-select" id="list-risk-filter" onchange="renderList()">
                  <option value="" data-i18n="list.filter.riskAll"></option>
                  <option value="pending" data-i18n="list.filter.riskPending"></option>
                  <option value="overdue" data-i18n="list.filter.riskOverdue"></option>
                </select>
              </div>
              <div class="filter-group date-filter">
                <label data-i18n="list.filter.startDate"></label>
                <input type="text" class="date-input" id="list-start-date" inputmode="numeric" onblur="normalizeDateInput(this);renderList()" onchange="normalizeDateInput(this);renderList()">
              </div>
              <div class="filter-group date-filter">
                <label data-i18n="list.filter.endDate"></label>
                <input type="text" class="date-input" id="list-end-date" inputmode="numeric" onblur="normalizeDateInput(this);renderList()" onchange="normalizeDateInput(this);renderList()">
              </div>
              <div class="filter-group" style="flex:2">
                <label data-i18n="list.filter.keyword"></label>
                <input type="text" class="search-input" id="search-input" data-i18n-placeholder="list.filter.keywordPlaceholder" oninput="renderList()">
              </div>
              <div class="filter-actions">
                <button class="btn btn-search" onclick="renderList()" data-i18n="list.btnSearch"></button>
                <button class="btn btn-clear" onclick="clearListFilter()" data-i18n="list.btnClear"></button>
              </div>
            </div>
          </div>
          <div class="table-section" id="list-table-section">
            <div class="table-section-title">
              <div class="table-section-title-left">
                <span class="table-section-icon">📝</span>
                <span data-i18n="list.sectionTitle"></span>
                <div class="view-mode-toggle" style="margin-left:12px">
                  <button id="mode-by-record" class="active" onclick="switchListMode('record')" data-i18n="list.mode.byRecord"></button>
                  <button id="mode-by-item" onclick="switchListMode('item')" data-i18n="list.mode.byItem"></button>
                </div>
              </div>
              <div class="table-section-actions" id="list-actions">
                <button class="btn btn-primary" id="btn-new-record-table" onclick="openRecordForm()" data-i18n="list.btnManual"></button>
                <button class="btn btn-success" id="btn-import-records" onclick="openImportDialog()" data-i18n="list.btnBatchImport"></button>
              </div>
            </div>
            <div class="batch-bar" id="batch-bar">
              <span class="batch-info"><span data-i18n="list.batch.selected" data-i18n-params='{"count":0}'></span></span>
              <button class="btn btn-primary btn-sm" onclick="openBatchProcessModal()" data-i18n="list.batch.btnUpdate"></button>
              <button class="btn btn-secondary btn-sm" onclick="clearBatchSelection()" data-i18n="list.batch.btnCancel"></button>
            </div>
            <div id="table-area"></div>
          </div>
          <div class="pagination" id="list-pagination"></div>
        </div>

        <!-- 新建记录弹窗 -->
        <div id="record-form-modal" class="record-fs-overlay hidden" onclick="if(event.target===this)closeRecordForm()">
          <form class="record-fs-panel" onsubmit="submitForApproval(event)">
            <div class="record-fs-header">
              <h3 id="form-title" data-i18n="form.titleNew"></h3>
              <button type="button" class="modal-close" onclick="closeRecordForm()">&times;</button>
            </div>
            <div class="record-fs-body">
              <fieldset class="form-section">
                  <legend data-i18n="form.section.basic"></legend>
                  <div class="form-grid">
                    <div class="form-group"><label data-i18n="form.label.date"></label> <span class="required">*</span><input type="text" class="date-input" id="f-aftersales-date" inputmode="numeric" required onblur="normalizeDateInput(this)"></div>
                  </div>
                </fieldset>
                <fieldset class="form-section">
                  <legend><span data-i18n="form.section.details"></span> <span style="font-size:12px;color:var(--text-muted);font-weight:400" data-i18n="form.hint.minOneItem"></span></legend>
                  <div class="detail-items-table-wrapper">
                    <table class="detail-items-table" id="detail-items-table">
                      <thead><tr>
                        <th style="width:8%"><span data-i18n="form.col.platform"></span> <span class="required">*</span></th>
                        <th style="width:10%"><span data-i18n="form.col.shopCustomer"></span></th>
                        <th style="width:11%"><span data-i18n="form.col.sku"></span> <span class="required">*</span></th>
                        <th style="width:10%" data-i18n="form.col.snCode"></th>
                        <th style="width:11%" data-i18n="form.col.orderNo"></th>
                        <th style="width:5%"><span data-i18n="form.col.qty"></span> <span class="required">*</span></th>
                        <th style="width:12%"><span data-i18n="form.col.returnReason"></span> <span class="required">*</span></th>
                        <th style="width:19%"><span data-i18n="form.col.description"></span> <span class="required">*</span></th>
                        <th style="width:10%" data-i18n="form.col.attachment"></th>
                        <th style="width:4%" data-i18n="form.col.actions"></th>
                      </tr></thead>
                      <tbody id="detail-items-tbody"></tbody>
                    </table>
                  </div>
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="addDetailItem()" data-i18n="form.btnAddRow"></button>
                    <span style="font-size:14px;font-weight:600"><span data-i18n="form.totalQty"></span><span id="detail-total-qty" style="color:var(--primary);font-size:16px">0</span></span>
                  </div>
                </fieldset>
                <fieldset class="form-section">
                  <legend data-i18n="form.section.approvers"></legend>
                  <div class="form-group">
                    <label data-i18n="form.label.approvalFlow"></label>
                    <!-- 不再让用户手动选择审批流；由系统按「审批流管理」中的配置自动应用 -->
                    <div id="f-approval-flow-card" class="approval-flow-card">
                      <div class="afc-header">
                        <span class="afc-icon">&#x2696;&#xFE0F;</span>
                        <span id="f-approval-flow-name" class="afc-name" data-i18n="form.flow.loading"></span>
                        <span id="f-approval-flow-tag" class="afc-tag" style="display:none" data-i18n="form.flow.autoTag"></span>
                      </div>
                      <div id="f-approval-flow-preview" class="approval-flow-preview"></div>
                    </div>
                  </div>
                  <div style="font-size:12px;color:var(--text-muted);margin-top:8px" data-i18n="form.hint.approverRule"></div>
                </fieldset>
              </div>
              <div class="record-fs-footer form-actions">
                <button type="submit" class="btn btn-primary btn-lg" id="form-submit-btn" data-i18n="form.btnSubmit"></button>
                <button type="button" class="btn btn-secondary btn-lg" onclick="saveAsDraft()" data-i18n="form.btnSaveDraft"></button>
                <button type="button" class="btn btn-secondary btn-lg" onclick="closeRecordForm()" data-i18n="form.btnCancel"></button>
              </div>
            </form>
          </div>
        </div>

        <!-- 详情页 -->
        <div id="page-detail" class="page">
          <div class="page-header">
            <div><h2 id="detail-title"></h2></div>
            <div style="display:flex;gap:12px">
              <button class="btn btn-secondary" onclick="showPage('list')" data-i18n="detail.btnBack"></button>
            </div>
          </div>
          <div class="detail-card" id="detail-content"></div>
        </div>

        <!-- 售后记录审批 -->
        <div id="page-approval" class="page">
          <div class="page-header">
            <h2 data-i18n="approval.title"></h2>
          </div>
          <div class="filter-bar">
            <div class="filter-form">
              <div class="filter-group" style="flex:2">
                <label data-i18n="approval.filter.keyword"></label>
                <input type="text" class="search-input" id="appr-search" data-i18n-placeholder="approval.filter.keywordPlaceholder" oninput="renderApproval()">
              </div>
              <div class="filter-group">
                <label data-i18n="approval.filter.scope"></label>
                <select class="filter-select" id="appr-tab" onchange="renderApproval()">
                  <option value="pending" data-i18n="approval.filter.pending"></option>
                  <option value="done" data-i18n="approval.filter.done"></option>
                  <option value="all" data-i18n="approval.filter.all"></option>
                </select>
              </div>
              <div class="filter-group">
                <label data-i18n="approval.filter.startDate"></label>
                <input type="text" class="date-input" id="appr-start-date" inputmode="numeric" onblur="normalizeDateInput(this);renderApproval()" onchange="normalizeDateInput(this);renderApproval()">
              </div>
              <div class="filter-group">
                <label data-i18n="approval.filter.endDate"></label>
                <input type="text" class="date-input" id="appr-end-date" inputmode="numeric" onblur="normalizeDateInput(this);renderApproval()" onchange="normalizeDateInput(this);renderApproval()">
              </div>
              <div class="filter-actions">
                <button class="btn btn-clear" onclick="clearApprovalFilter()" data-i18n="approval.btnClear"></button>
              </div>
            </div>
          </div>
          <div id="approval-table-area"></div>
          <div class="pagination" id="appr-pagination"></div>
        </div>

        <!-- 商品管理 -->
        <div id="page-products" class="page">
          <div class="page-header">
            <h2 data-i18n="products.title"></h2>
            <div style="display:flex;gap:10px;align-items:center">
              <button class="btn btn-secondary" id="btn-template-products" onclick="downloadProductTemplate()" data-i18n="products.btnDownloadTemplate"></button>
              <button class="btn btn-secondary" id="btn-import-products" onclick="openProductImportModal()" data-i18n="products.btnBatchImport"></button>
              <button class="btn btn-secondary" id="btn-export-products" onclick="exportProducts()" data-i18n="products.btnBatchExport"></button>
              <button class="btn btn-primary" id="btn-new-product" onclick="openProductModal()" data-i18n="products.btnNew"></button>
            </div>
          </div>
          <div id="prod-batch-bar" class="prod-batch-bar">
            <div class="batch-inner">
              <span id="prod-selected-count" class="batch-count" data-i18n="products.batch.selected" data-i18n-params='{"count":0}'></span>
              <button class="btn btn-danger" id="btn-batch-delete" onclick="batchDeleteProducts()" data-i18n="products.batch.btnDelete"></button>
              <button class="btn btn-clear" id="btn-clear-selection" onclick="clearProductSelection()" data-i18n="products.batch.btnCancel"></button>
            </div>
          </div>
          <div class="filter-bar">
            <div class="filter-form">
              <div class="filter-group" style="flex:2">
                <label data-i18n="products.filter.keyword"></label>
                <input type="text" class="search-input" id="prod-search" data-i18n-placeholder="products.filter.keywordPlaceholder" oninput="renderProducts()">
              </div>
              <div class="filter-group">
                <label data-i18n="products.filter.brand"></label>
                <select class="filter-select" id="prod-brand-filter" onchange="renderProducts()"><option value="" data-i18n="products.filter.allBrands"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="products.filter.country"></label>
                <select class="filter-select" id="prod-country-filter" onchange="renderProducts()"><option value="" data-i18n="products.filter.allCountries"></option></select>
              </div>
              <div class="filter-group">
                <label data-i18n="products.filter.status"></label>
                <select class="filter-select" id="prod-status-filter" onchange="renderProducts()">
                  <option value="" data-i18n="products.filter.statusAll"></option><option value="active" data-i18n="products.filter.statusActive"></option><option value="disabled" data-i18n="products.filter.statusDisabled"></option>
                </select>
              </div>
              <div class="filter-actions">
                <button class="btn btn-search" onclick="renderProducts()" data-i18n="products.btnSearch"></button>
                <button class="btn btn-clear" onclick="clearProductFilter()" data-i18n="products.btnClear"></button>
              </div>
            </div>
          </div>
          <div id="products-table-area"></div>
          <div class="pagination" id="prod-pagination"></div>
        </div>

        <!-- 用户管理 -->
        <div id="page-users" class="page">
          <div class="page-header">
            <h2 data-i18n="users.title"></h2>
            <button class="btn btn-primary" onclick="openUserModal()" data-i18n="users.btnNew"></button>
          </div>
          <div id="users-table-area"></div>
        </div>

        <!-- 角色管理 -->
        <div id="page-roles" class="page">
          <div class="page-header">
            <h2 data-i18n="roles.title"></h2>
            <button class="btn btn-primary" onclick="openRoleModal()" data-i18n="roles.btnNew"></button>
          </div>
          <div id="roles-table-area"></div>
        </div>

        <!-- 审批流管理 -->
        <div id="page-approval-flows" class="page">
          <div class="page-header">
            <h2 data-i18n="approvalFlows.title"></h2>
            <div style="display:flex;gap:8px">
              <button class="af-btn af-btn-primary af-btn-sm" onclick="createApprovalFlow()">+ <span data-i18n="approvalFlows.btnNew"></span></button>
            </div>
          </div>
          <div id="approval-flows-area"></div>

// 审批状态统一映射: 将数据库存储值(中文/英文/旧值)归一化为标准 key(completed|pending|rejected)

// 已拒绝/rejected/审批拒绝/已驳回 → rejected
const APPROVAL_STATUS_CANON = {
  '已完成':'completed', 'completed':'completed', 'approved':'completed', '审批通过':'completed',
  '一级审批通过':'completed', '二级审批通过':'completed', '三级审批通过':'completed',
  '待审批':'pending', 'pending':'pending', 'pending_approval':'pending', 'pendingApproval':'pending',
  '待一级审批':'pending', '待二级审批':'pending', '待三级审批':'pending', '草稿':'pending',
  '已拒绝':'rejected', 'rejected':'rejected', '审批拒绝':'rejected', '已驳回':'rejected'
};
const APPROVAL_STATUS_LABEL_KEY = {
  'completed':'approvalStatusDisplay.completed',
  'pending':'approvalStatusDisplay.pending',
  'rejected':'approvalStatusDisplay.rejected'
};
// 按当前语言翻译审批状态; 未知值兜底返回原始值, 避免空白
function tApprovalStatus(value){
  if(!value) return '';
  const canon = APPROVAL_STATUS_CANON[String(value)] || String(value);
  return APPROVAL_STATUS_LABEL_KEY[canon] ? t(APPROVAL_STATUS_LABEL_KEY[canon]) : value;
}

async function getRecords(){
  try{
    const data = await getRecordsAsync();
    // Migrate old records to new items-based format
    let migrated=false;
    let records=Array.isArray(data) ? data.map(r=>{
      if(!r.items){
        migrated=true;
        return {
          ...r,
          items:[{
            platform:r.platform||'',
            sku_code:r.sku_code||'',
            order_no:r.order_no||'',
            quantity:r.quantity||1,
            return_reason:'可二次销售',
            fault_description:r.fault_description||''
          }],
          total_quantity:r.quantity||1,
          platforms:r.platform?[r.platform]:[]
        };
      }
      if(r.items.some(it=>it.return_type&&!it.return_reason)){
        migrated=true;
        r.items=r.items.map(it=>{
          if(it.return_type&&!it.return_reason){
            const oldMap={'退货':'可二次销售','换货':'彩盒损坏','维修':'硬件故障','折让':'可二次销售','其他':'可二次销售'};
            it.return_reason=oldMap[it.return_type]||it.return_type;
            delete it.return_type;
          }
          return it;
        });
      }
      if(r.items.some(it=>!it.platform)){
        migrated=true;
        const defaultPlatform=r.platform||'';
        r.items=r.items.map(it=>({...it,platform:it.platform||defaultPlatform}));
      }
      if((r.items||[]).some(it=>!it.process_type||!it.process_progress)){
        migrated=true;
        r.items=r.items.map(it=>normalizeProcessItem(it));
      }else{
        r.items=r.items.map(it=>normalizeProcessItem(it));
      }
      if(r.platform&&!r.platforms){
        migrated=true;
        r.platforms=[r.platform];
      }
      if(!r.platforms) r.platforms=[];
      if(!r.total_quantity) r.total_quantity=(r.items||[]).reduce((s,it)=>s+(it.quantity||0),0);
      return r;
    }) : [];
    if(migrated) await saveRecordsAsync(records);
    return records;
  }catch(e){return[];}
}

function getAuthHeaders() {
  const user = getCurrentUser();
  let perms = '';
  if (user) {
    const role = getUserRole(user);
    if (role && role.permissions) {
      perms = Array.isArray(role.permissions) ? role.permissions.join(',') : normalizePermissions(role.permissions).join(',');
    }
  }
  return {
    'Content-Type': 'application/json',
    'X-User-Id': user ? user.id : '',
    'X-User-Role': user ? user.role_id : '',
    'X-User-Permissions': perms
  };
}

async function checkDbAvailable() {
  if (_dbAvailable !== null) return _dbAvailable;
  try {
    const resp = await fetch('/api/db/status');
    const data = await resp.json();
    _dbAvailable = data.connected;
    return _dbAvailable;
  } catch (e) {
    _dbAvailable = false;
    return false;
  }
}

function cacheValid() { return Date.now() - _cacheTimestamp < CACHE_TTL; }

// 用户
async function getUsersAsync() {
  if (await checkDbAvailable()) {
    if (!_usersCache || !cacheValid()) {
      try {
        const resp = await fetch('/api/users', { headers: getAuthHeaders() });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          console.warn('[getUsersAsync] API error:', resp.status, err.error || resp.statusText);
          return _usersCache || [];
        }
        _usersCache = await resp.json();
        _cacheTimestamp = Date.now();
      } catch (e) {
        console.warn('[getUsersAsync] fetch error:', e);
        return _usersCache || [];
      }
    }
    return _usersCache;
  }
  // fallback to localStorage
  try { return JSON.parse(localStorage.getItem('aftersales_users') || '[]'); } catch(e) { return []; }
}
async function saveUserAsync(user) {
  _usersCache = null;
  if (await checkDbAvailable()) {
    const resp = await fetch(`/api/users/${user.id}`, {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify(user)
    });
    return await resp.json();
  }
  const users = await getUsersAsync();
  const idx = users.findIndex(u => u.id === user.id);
  if (idx >= 0) users[idx] = user; else users.push(user);
  localStorage.setItem('aftersales_users', JSON.stringify(users));
  return user;
}

    if (resp.ok) return result;

  users.push(user);

  if(migrated!=='true') {

    localStorage.setItem('aftersales_v3_migrated','true');
    console.log('[Migration v3] Cleared old aftersales records');
  }
  
  // 飞书用户名迁移：将 feishu_xxx 改为飞书名称（仅执行一次）
  const fsMigrated = localStorage.getItem('aftersales_fs_username_migrated');
  if (fsMigrated !== 'true') {
    const users = await getUsers();
    let changed = false;
    for (const u of users) {
      if (u.feishu_open_id && u.username && u.username.startsWith('feishu_')) {
        const oldName = u.username;
        const newName = u.feishu_name || u.name || u.username;
        if (newName !== oldName) {
          u.username = newName;
          changed = true;
          console.log(`[Migration] 飞书用户名迁移: ${oldName} → ${newName}`);
        }
      }
    }
    if (changed) {
      await saveUsers(users);
    }
    localStorage.setItem('aftersales_fs_username_migrated', 'true');
  }
}

function normalizePermissions(permissions){
  if(Array.isArray(permissions)) return permissions;
  if(typeof permissions==='string' && permissions.trim()){
    try{ return JSON.parse(permissions); }catch(e){ return permissions.split(',').map(s=>s.trim()).filter(Boolean); }
  }
  return [];
}

function getUserRole(user){
  if(!user) return null;
  // 优先使用缓存（由 API 层或 initDefaultData 填充），否则从 localStorage 读取
  const roles = _rolesCache || (function(){ try{return JSON.parse(localStorage.getItem('aftersales_roles')||'[]');}catch(e){return[];} })();
  const role = roles.find(r=>r.id===user.role_id)||null;
  if(role && !Array.isArray(role.permissions)){
    role.permissions = normalizePermissions(role.permissions);
  }
  return role;
}

function hasPermission(perm){
  const user=getCurrentUser();
  if(!user) return false;
  const role=getUserRole(user);
  if(!role) return false;
  return normalizePermissions(role.permissions).includes(perm);
}

function requirePermission(perm){
  if(!hasPermission(perm)){ showFlash(t('flash.noPermission'),'danger'); return false; }
  return true;
}
const PAGE_PERMISSIONS = {

function canAccessPage(page){
  const requiredPerm = PAGE_PERMISSIONS[page];
  if(!requiredPerm) return false;
  const perms = Array.isArray(requiredPerm) ? requiredPerm : [requiredPerm];
  return perms.some(p => hasPermission(p));
}
function getDefaultAccessiblePage(){
  return Object.keys(PAGE_PERMISSIONS).find(canAccessPage) || null;
}

/**
 * 审批提交/流转后发送飞书通知给当前待审批人
 * @param {Object} record - 售后记录
 */
async function sendApprovalNotification(record) {
  if (!record || !record.id) return {success:false, error:'missing_record'};

  const level = record.current_approval_level;
  if (level <= 0) return {success:true, skipped:true, reason:'flow_finished'}; // 无需通知

  const users = await getUsers();
  const approverId = record['approver_level'+level+'_id'];
  if (!approverId) {
    console.warn('[Notify] 当前审批级别无审批人，跳过通知');
    return {success:false, error:'missing_approver_id', level};
  }

  const approver = users.find(u => u.id === approverId);
  if (!approver) {
    console.error('[Notify] 审批人未在用户列表中找到:', approverId);
    return {success:false, error:'approver_not_found', approverId, level};
  }

  // 检查飞书绑定
  if (!approver.feishu_open_id && !approver.feishu_user_id && !approver.open_id && !approver.user_id) {
    console.warn('[Notify] 审批人 ' + approver.name + ' 本地缓存未发现飞书绑定，将交由后端按用户表再次解析');
  }

  try {
    const resp = await fetch('/api/notify/approval', {
      method: 'POST',
      headers: getAuthHeaders(),
      body: JSON.stringify({
        recordId: record.id,
        record: record,
        approvalLevel: level,
        approvers: [{
          id: approver.id,
          name: approver.name,
          feishu_open_id: approver.feishu_open_id || approver.open_id || '',
          feishu_union_id: approver.feishu_union_id || '',
          feishu_user_id: approver.feishu_user_id || approver.user_id || ''
        }]
      })
    });

    const result = await resp.json();
    if (result.success) {
      if (result.mock) {
        console.log('[Notify Mock]', result.message);
      } else {
        console.log('[Notify] 通知已发送给 ' + approver.name + ':', result.message);
      }
    } else {
      const detail = (result.results && result.results.failed && result.results.failed[0] && result.results.failed[0].reason)
                    || result.error || result.message || '';
      const failedCode = result.results && result.results.failed && result.results.failed[0] && result.results.failed[0].code;
      console.error('[Notify] 通知发送失败:', result.message || result.error, detail, result);
      if (failedCode === 'APPROVER_NOT_BOUND' || failedCode === 'USER_NOT_BOUND') {
        showFlash(t('flash.approvalSubmitFeishuNotBound', {name: approver.name}), 'warning');
      } else {
        showFlash(t('flash.feishuNotifyFailed'), 'warning');
      }
    }
    return result;
  } catch (e) {
    console.error('[Notify] 后端不可用，飞书通知发送失败:', e.message);
    showFlash(t('flash.feishuNotifyFailed'), 'warning');
    return {success:false, error:e.message};
  }
}

// ==================== URL HASH ROUTING ====================
/**
 * 处理 URL Hash 路由
 * 支持格式：
 *   #page=overview
 *   #page=approval&record=123
 *   #page=list&view=detail
 */
function handleHashRoute() {
  const hash = window.location.hash.replace(/^#/, '');
  if (!hash) return;

  const params = {};
  hash.split('&').forEach(pair => {
    const [key, val] = pair.split('=');
    if (key && val) params[decodeURIComponent(key)] = decodeURIComponent(val);
  });

  const page = params.page;
  if (!page) return;

  // 权限检查
  const user = getCurrentUser();
  if (!user) return;

  if (!canAccessPage(page)) {
    showFlash(t('flash.noPagePermission'), 'danger');
    const fallback = getDefaultAccessiblePage();
    if (fallback) showPage(fallback);
    return;
  }

  if (page === 'detail' && params.id) {
    showPage('detail', params.id);
  } else {
    showPage(page);
  }

  // 如果是审批页面且有 record 参数，跳转到售后详情完成审批
  if (page === 'approval' && params.record) {
    const recordId = params.record;
    if (recordId) {
      setTimeout(() => {
        showPage('detail', recordId);
      }, 300);
    }
  }

  // 列表页的视图模式
  if (page === 'list' && params.view === 'detail') {
    setTimeout(() => {
      if (typeof switchListMode === 'function') {
        switchListMode('item');
      }
    }, 200);
  }
}

// 监听 hash 变化
window.addEventListener('hashchange', () => {
  if (getCurrentUser()) {
    handleHashRoute();
  }
});
