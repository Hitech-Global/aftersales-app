services:
  - type: web
    name: aftersales-app
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://aftersales-app.onrender.com
      - key: FEISHU_ENABLED
        value: "true"
      - key: FEISHU_APP_NAME
        value: 售后数据管理系统
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_MAX_AGE_MS
        sync: false
      - key: BREAKGLASS_ENABLED
        sync: false
      - key: BREAKGLASS_PASSWORD_HASH
        sync: false
